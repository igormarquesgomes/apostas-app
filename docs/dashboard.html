<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · OddLab</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F0EDEA;--surface:#FFFFFF;--surface2:#F8FAFC;--surface3:#F1F5F9;
  --border:#E2E8F0;--border2:#CBD5E1;
  --text:#1E293B;--text2:#475569;--text3:#94A3B8;
  --green:#0F766E;--green-lt:#F0FDF9;--green-bd:#99F6E4;
  --red:#DC2626;--red-lt:#FEF2F2;--red-bd:#FECACA;
  --amber:#D97706;--amber-lt:#FFFBEB;--amber-bd:#FDE68A;
  --blue:#2563EB;--blue-lt:#EFF6FF;--blue-bd:#BFDBFE;
  --purple:#7C3AED;--purple-lt:#F5F3FF;--purple-bd:#DDD6FE;
  --nav-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}

/* NAV */
.nav{position:sticky;top:0;z-index:200;height:var(--nav-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.25rem;gap:1.5rem;}
.nav-brand{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0;}
.nav-brand-icon{width:30px;height:30px;background:var(--green);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.nav-brand-icon svg{width:14px;height:14px;color:#fff;}
.nav-brand-name{font-size:15px;font-weight:700;color:var(--text);}
.nav-brand-name span{color:var(--green);}
.nav-links{display:flex;align-items:center;gap:2px;flex:1;}
.nl{padding:6px 10px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text2);text-decoration:none;transition:all .15s;white-space:nowrap;}
.nl:hover{background:var(--surface2);color:var(--text);}
.nl.active{background:var(--green-lt);color:var(--green);}

/* PAGE */
.page{padding:1.25rem;max-width:1100px;}

/* PERIOD CARDS */
.period-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem;}
.period-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;border-top:3px solid var(--border);}
.period-card.blue-top{border-top-color:var(--blue);}
.period-card.green-top{border-top-color:var(--green);}
.period-card.purple-top{border-top-color:var(--purple);}
.period-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:8px;}
.period-pct{font-size:40px;font-weight:800;line-height:1;margin-bottom:6px;}
.period-pct.good{color:var(--green);}
.period-pct.ok{color:var(--amber);}
.period-pct.bad{color:var(--red);}
.period-pct.empty{color:var(--text3);}
.period-detail{display:flex;gap:10px;}
.period-d{font-size:12px;color:var(--text2);}
.period-d strong{font-size:13px;font-weight:600;}

/* HEALTH BANNER */
.health-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:1rem;display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:start;}
.health-left{}
.health-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px;}
.health-pct{font-size:52px;font-weight:800;line-height:1;margin-bottom:4px;}
.health-sub{font-size:12px;color:var(--text2);}
.health-right{}
.top3-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:10px;}
.top3-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.top3-rank{font-size:13px;font-weight:700;color:var(--text3);width:16px;flex-shrink:0;}
.top3-info{flex:1;}
.top3-name{font-size:12px;font-weight:500;display:flex;justify-content:space-between;margin-bottom:3px;}
.top3-bar{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;}
.top3-fill{height:100%;border-radius:2px;}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px;}
.stat-val{font-size:32px;font-weight:800;line-height:1;}

/* MÚLTIPLAS STATS */
.mult-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px;}
.mult-mini{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;}
.mult-mini-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:4px;}
.mult-mini-val{font-size:22px;font-weight:700;line-height:1;margin-bottom:2px;}
.mult-mini-sub{font-size:11px;color:var(--text3);}

/* SECTION */
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:1.25rem;}
.section-title{font-size:13px;font-weight:700;color:var(--text);}
.hist-tabs{display:flex;gap:4px;}
.hist-tab{font-size:12px;font-weight:500;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;}
.hist-tab.active{background:var(--green);color:#fff;border-color:var(--green);}

/* ADMIN BUTTONS */
.admin-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem;}
.admin-btn{display:flex;flex-direction:column;align-items:flex-start;gap:4px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;text-align:left;}
.admin-btn:hover{border-color:var(--border2);background:var(--surface2);}
.admin-btn:disabled{opacity:.5;cursor:not-allowed;}
.admin-btn-icon{font-size:18px;}
.admin-btn-label{font-size:12px;font-weight:600;color:var(--text);}
.admin-btn-desc{font-size:11px;color:var(--text3);}

/* HOJE EM TEMPO REAL */
.hoje-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:1rem;}
.hoje-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.hoje-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;}
.hoje-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hoje-actions{display:flex;gap:6px;}
.hoje-btn{font-size:11px;font-weight:600;padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.hoje-btn:hover{border-color:var(--border2);color:var(--text);}
.hoje-btn:disabled{opacity:.5;cursor:not-allowed;}

/* DAILY ITEMS */
.daily-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:6px;}
.daily-hd{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .1s;}
.daily-hd:hover{background:var(--surface2);}
.daily-date{font-size:12px;font-weight:500;color:var(--text2);width:70px;flex-shrink:0;}
.daily-bar-wrap{flex:1;}
.daily-bar{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;}
.daily-bar-fill{height:100%;border-radius:2px;}
.daily-pct{font-size:16px;font-weight:700;width:48px;text-align:right;flex-shrink:0;}
.daily-gr{display:flex;gap:8px;flex-shrink:0;}
.daily-g{font-size:12px;font-weight:600;color:var(--green);}
.daily-r{font-size:12px;font-weight:600;color:var(--red);}
.daily-chev{width:16px;height:16px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.daily-chev.open{transform:rotate(180deg);}
.daily-apostas{display:none;border-top:1px solid var(--border);}
.daily-apostas.open{display:block;}
.ap-row{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.ap-row:last-child{border-bottom:none;}
.ap-left{flex:1;min-width:0;}
.ap-jogo{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ap-meta{font-size:11px;color:var(--text2);margin-top:1px;}
.ap-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ap-odd{font-size:12px;font-weight:600;color:var(--amber);}
.rbadge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.r-green{background:var(--green-lt);color:var(--green);border:1px solid var(--green-bd);}
.r-red{background:var(--red-lt);color:var(--red);border:1px solid var(--red-bd);}
.r-pend{background:var(--amber-lt);color:var(--amber);border:1px solid var(--amber-bd);}

/* BANCA */
.banca-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:1rem;}
.banca-hd{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;}
.banca-input-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:14px;}
.banca-field{flex:1;}
.banca-field label{display:block;font-size:11px;font-weight:500;color:var(--text3);margin-bottom:4px;}
.banca-field input{width:100%;border:1px solid var(--border2);border-radius:7px;padding:7px 10px;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);background:var(--surface2);outline:none;}
.banca-field input:focus{border-color:var(--green);}
.banca-calc-btn{padding:8px 16px;background:var(--green-lt);color:var(--green);border:1px solid var(--green-bd);border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.banca-calc-btn:hover{background:var(--green);color:#fff;}
.banca-results{display:none;}
.banca-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;}
.banca-mini{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;}
.banca-mini-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:4px;}
.banca-mini-v{font-size:15px;font-weight:600;}

/* PERÍODO ACCORDION */
.periodo-item{margin-bottom:6px;}
.periodo-hd{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:8px 12px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);transition:background .1s;}
.periodo-hd:hover{background:var(--surface3);}
.periodo-label{font-size:12px;font-weight:600;color:var(--text2);}
.periodo-right{display:flex;gap:10px;align-items:center;}
.periodo-gr{font-size:11px;color:var(--text3);}
.periodo-pct{font-size:14px;font-weight:700;}
.periodo-chev{font-size:10px;color:var(--text3);}
.periodo-body{display:none;padding:4px 0 0;}

/* MULT HISTORICO */
.mult-hist-item{margin-bottom:4px;}
.mult-hist-hd{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:6px 10px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);}
.mult-hist-hd:hover{background:var(--surface3);}
.mult-hist-label{font-size:11px;font-weight:600;}
.mult-hist-right{display:flex;gap:12px;font-size:10px;}
.mult-hist-body{display:none;padding:4px 0 0;}
.mult-dia-row{display:flex;align-items:center;justify-content:space-between;padding:3px 8px;border-radius:4px;background:var(--surface3);margin-bottom:2px;}
.mult-dia-label{font-size:11px;color:var(--text2);}
.mult-dia-badges{display:flex;gap:6px;}

/* STATES */
.loading{text-align:center;padding:2.5rem;}
.spin{width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 8px;}
.empty{text-align:center;padding:2rem;color:var(--text3);font-size:12px;}
@keyframes sp{to{transform:rotate(360deg);}}

@media(max-width:768px){
  .period-grid{grid-template-columns:1fr 1fr;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .admin-grid{grid-template-columns:1fr 1fr;}
  .health-card{grid-template-columns:1fr;}
  .mult-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<div class="page">

<script>
const B='https://apostas-app.onrender.com';
let dadosGlobais=[];
let dadosMultiplasDias=[];

function corP(p){return p>=80?'var(--green)':p>=60?'var(--amber)':'var(--red)';}
function cP(p){return p>=80?'good':p>=60?'ok':'bad';}
function hoje(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function off(b,n){const d=new Date(b+'T12:00:00');d.setDate(d.getDate()+n);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmtD(s){const[y,m,d]=s.split('-');return`${d}/${m}`;}
function fmtDL(iso){const[a,m,d]=iso.split('-');return`${d}/${m}/${a}`;}

// Badge HTML para tema claro
function badgeG(label){return`<span class="rbadge r-green">${label}</span>`;}
function badgeR(label){return`<span class="rbadge r-red">${label}</span>`;}
function badgeP(label){return`<span class="rbadge r-pend">${label}</span>`;}

async function load(){
  const h=hoje(),ps=[];
  for(let i=0;i<30;i++) ps.push(
    fetch(`${B}/apostas-resultado/${off(h,-i)}`).then(r=>r.ok?r.json():null).catch(()=>null)
    .then(async d=>{
      if(!d?.apostas) return null;
      try{const m=await fetch(`${B}/multiplas/${off(h,-i)}`).then(r=>r.ok?r.json():null);if(m){d.multiplas=m.multiplas;d.resultados_multiplas=m.resultados_multiplas;}}catch(e){}
      return d;
    })
  );
  const dias=(await Promise.all(ps)).filter(d=>d&&d.apostas);
  processar(dias,h);
}

function processar(dias,h){
  let tG=0,tR=0,tT=0;
  const ligasMap={};
  const ontem=off(h,-1),sm=h.substring(0,8)+'01';
  const hoje_d=new Date(h+'T12:00:00');
  const diaSem=hoje_d.getDay();
  const diasDesdeSegunda=diaSem===0?6:diaSem-1;
  const sw=off(h,-diasDesdeSegunda);
  let oG=0,oR=0,sG=0,sR=0,mG=0,mR=0;
  let mAG=0,mAR=0,mBG=0,mBR=0,mAP=0,mBP=0;
  dadosMultiplasDias=[];
  const diasP=[];

  for(const dia of dias){
    const ap=dia.apostas?.jogos||[],res=dia.resultados?.apostas||[];
    let dG=0,dR=0,dP=0;
    const apR=ap.map(a=>{
      const r=res.find(x=>x.jogo_id===a.id);
      const rv=r?.resultado_aposta||'pendente';
      if(rv==='green'){dG++;tG++;}else if(rv==='red'){dR++;tR++;}else if(rv!=='cancelado')dP++;
      const lg=a.liga||'Outras';
      if(!ligasMap[lg])ligasMap[lg]={green:0,red:0,total:0};
      if(rv==='green')ligasMap[lg].green++;else if(rv==='red')ligasMap[lg].red++;
      if(rv!=='pendente')ligasMap[lg].total++;
      return{...a,resultado:rv,placar:r?.placar||null};
    });
    tT+=ap.length;
    const dt=dG+dR,da=dt>0?Math.round(dG/dt*100):null;
    if(dia.data===ontem){oG+=dG;oR+=dR;}
    if(dia.data>=sw){sG+=dG;sR+=dR;}
    if(dia.data>=sm){mG+=dG;mR+=dR;}
    const rM=dia.resultados_multiplas;
    const rA=rM?.multipla_a?.resultado||(dia.multiplas?.multipla_a?'pendente':null);
    const rB=rM?.multipla_b?.resultado||(dia.multiplas?.multipla_b?'pendente':null);
    if(dia.data>=sm){
      if(rA==='green')mAG++;else if(rA==='red')mAR++;else if(rA)mAP++;
      if(rB==='green')mBG++;else if(rB==='red')mBR++;else if(rB)mBP++;
    }
    if(rA||rB)dadosMultiplasDias.push({data:dia.data,rA,rB});
    diasP.push({data:dia.data,apostas:apR,green:dG,red:dR,pendente:dP,total:ap.length,assert:da,multiplas:dia.multiplas,resultados_multiplas:rM});
  }

  const tv=tG+tR,ag=tv>0?Math.round(tG/tv*100):null;
  const ligas=Object.entries(ligasMap).filter(([,v])=>v.total>=1).map(([n,v])=>({nome:n,...v,pct:Math.round(v.green/v.total*100)})).sort((a,b)=>b.pct-a.pct);
  const saude={ontem:{g:oG,r:oR,pct:oG+oR>0?Math.round(oG/(oG+oR)*100):null},semana:{g:sG,r:sR,pct:sG+sR>0?Math.round(sG/(sG+sR)*100):null},mes:{g:mG,r:mR,pct:mG+mR>0?Math.round(mG/(mG+mR)*100):null}};
  const multiplas={a:{green:mAG,red:mAR,pendente:mAP,total:mAG+mAR},b:{green:mBG,red:mBR,pendente:mBP,total:mBG+mBR}};
  const semanasMap={},mesesMap={};
  for(const dia of diasP){
    const d=new Date(dia.data+'T12:00:00'),ds=d.getDay(),diasSeg=ds===0?6:ds-1;
    const segData=new Date(d);segData.setDate(d.getDate()-diasSeg);
    const swKey=segData.toISOString().substring(0,10);
    const domData=new Date(segData);domData.setDate(segData.getDate()+6);
    const swLabel=`${fmtD(swKey)} – ${fmtD(domData.toISOString().substring(0,10))}`;
    if(!semanasMap[swKey])semanasMap[swKey]={label:swLabel,g:0,r:0,dias:[]};
    semanasMap[swKey].g+=dia.green;semanasMap[swKey].r+=dia.red;semanasMap[swKey].dias.push(dia);
    const mesKey=dia.data.substring(0,7);
    const[my,mm]=mesKey.split('-');
    const nomesMes=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    if(!mesesMap[mesKey])mesesMap[mesKey]={label:`${nomesMes[parseInt(mm)-1]} ${my}`,g:0,r:0,dias:[]};
    mesesMap[mesKey].g+=dia.green;mesesMap[mesKey].r+=dia.red;mesesMap[mesKey].dias.push(dia);
  }

  dadosGlobais=diasP;window._diasCache=diasP;
  renderSaude(saude);renderHealth(ag,ligas,tG,tR);renderStats(ag,tT,tG,tR,multiplas);renderDiario(diasP);renderPeriodos(semanasMap,mesesMap);
}

function renderHistoricoMultiplas(){

  const fmtMes=m=>{const[y,mo]=m.split('-');const n=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];return`${n[parseInt(mo)-1]} ${y}`;};
  el.innerHTML=Object.entries(meses).sort((a,b)=>b[0].localeCompare(a[0])).map(([mes,dias])=>{
    const aGs=dias.filter(d=>d.rA==='green').length,aRs=dias.filter(d=>d.rA==='red').length;

      const bB=d.rB==='green'?`<span style="color:var(--green);font-size:10px;font-weight:700">✓B</span>`:d.rB==='red'?`<span style="color:var(--red);font-size:10px;font-weight:700">✗B</span>`:`<span style="color:var(--text3);font-size:10px">?B</span>`;
      return`<div class="mult-dia-row"><span class="mult-dia-label">Dia ${d.data.substring(8,10)}</span><div class="mult-dia-badges">${bA}${bB}</div></div>`;
    }).join('');

      <div class="mult-hist-hd" onclick="document.getElementById('${id}').style.display=document.getElementById('${id}').style.display==='none'?'block':'none'">
        <span class="mult-hist-label">${fmtMes(mes)}</span>
        <div class="mult-hist-right">
          <span>A: <span style="color:var(--green);font-weight:600">${aGs}G</span> <span style="color:var(--red);font-weight:600">${aRs}R</span></span>
          <span>B: <span style="color:var(--green);font-weight:600">${bGs}G</span> <span style="color:var(--red);font-weight:600">${bRs}R</span></span>
          <span style="color:var(--text3)">▼</span>
        </div>
      </div>
      <div class="mult-hist-body" id="${id}" style="display:none">${diasHtml}</div>
    </div>`;
  }).join('');
}

function renderPeriodos(semanas,meses){
  const renderFilhos=(v,tipo)=>{
    if(tipo==='semanas'){
      return v.dias.sort((a,b)=>b.data.localeCompare(a.data)).map(dia=>{
        const dt=fmtD(dia.data),dT=dia.green+dia.red;
        const dPct=dT>0?Math.round(dia.green/dT*100):null;
        const dCor=dPct===null?'var(--text3)':corP(dPct);
        return`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 10px;border-radius:5px;background:var(--surface3);margin-bottom:2px">
          <span style="font-size:12px;color:var(--text2)">${dt}</span>
          <div style="display:flex;gap:8px;align-items:center">
            <span style="font-size:11px;color:var(--text3)">${dia.green}G ${dia.red}R</span>
            <span style="font-size:12px;font-weight:700;color:${dCor}">${dPct!==null?dPct+'%':'--'}</span>
          </div>
        </div>`;
      }).join('');
    }else{
      const semsDoMes={};
      v.dias.forEach(dia=>{
        const d=new Date(dia.data+'T12:00:00'),ds=d.getDay(),diasSeg=ds===0?6:ds-1;
        const seg=new Date(d);seg.setDate(d.getDate()-diasSeg);
        const sk=seg.toISOString().substring(0,10);
        const dom=new Date(seg);dom.setDate(seg.getDate()+6);
        if(!semsDoMes[sk])semsDoMes[sk]={label:`${fmtD(sk)} – ${fmtD(dom.toISOString().substring(0,10))}`,g:0,r:0,dias:[]};
        semsDoMes[sk].g+=dia.green;semsDoMes[sk].r+=dia.red;semsDoMes[sk].dias.push(dia);
      });
      return Object.entries(semsDoMes).sort((a,b)=>b[0].localeCompare(a[0])).map(([sk,sv])=>{
        const sT=sv.g+sv.r,sPct=sT>0?Math.round(sv.g/sT*100):null;
        const sCor=sPct===null?'var(--text3)':corP(sPct);
        const sid='mesw-'+sk.replace(/[^a-z0-9]/gi,'');
        const diasHtml=sv.dias.sort((a,b)=>b.data.localeCompare(a.data)).map(dia=>{
          const dt=fmtD(dia.data),dT=dia.green+dia.red;
          const dPct=dT>0?Math.round(dia.green/dT*100):null;
          return`<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 8px;border-radius:4px;background:var(--bg);margin-bottom:2px">
            <span style="font-size:11px;color:var(--text2)">${dt}</span>
            <span style="font-size:11px;font-weight:700;color:${dPct===null?'var(--text3)':corP(dPct)}">${dPct!==null?dPct+'%':'--'}</span>
          </div>`;
        }).join('');
        return`<div style="margin-bottom:3px">
          <div onclick="document.getElementById('${sid}').style.display=document.getElementById('${sid}').style.display==='none'?'block':'none'"
               style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:5px 10px;border-radius:6px;background:var(--surface3);margin-bottom:2px">
            <span style="font-size:11px;color:var(--text2)">${sv.label}</span>
            <div style="display:flex;gap:8px;align-items:center">
              <span style="font-size:10px;color:var(--text3)">${sv.g}G ${sv.r}R</span>
              <span style="font-size:12px;font-weight:700;color:${sCor}">${sPct!==null?sPct+'%':'--'}</span>
            </div>
          </div>
          <div id="${sid}" style="display:none;padding:0 4px">${diasHtml}</div>
        </div>`;
      }).join('');
    }
  };
  const renderLista=(mapa,containerId,tipo)=>{
    const el=document.getElementById(containerId);
    if(!el)return;
    el.innerHTML=Object.entries(mapa).sort((a,b)=>b[0].localeCompare(a[0])).map(([key,v])=>{
      const total=v.g+v.r,pct=total>0?Math.round(v.g/total*100):null;
      const cor=pct===null?'var(--text3)':corP(pct);
      const id='periodo-'+key.replace(/[^a-z0-9]/gi,'');
      return`<div class="periodo-item">
        <div class="periodo-hd" onclick="document.getElementById('${id}').style.display=document.getElementById('${id}').style.display==='none'?'block':'none'">
          <span class="periodo-label">${v.label}</span>
          <div class="periodo-right">
            <span class="periodo-gr">${v.g}G · ${v.r}R</span>
            <span class="periodo-pct" style="color:${cor}">${pct!==null?pct+'%':'--'}</span>
            <span class="periodo-chev">▼</span>
          </div>
        </div>
        <div class="periodo-body" id="${id}">${renderFilhos(v,tipo)}</div>
      </div>`;
    }).join('');
  };
  renderLista(semanas,'periodos-semanas','semanas');
  renderLista(meses,'periodos-meses','meses');
}

async function validarDataEspecifica(){
  const data=prompt('Data para validar (YYYY-MM-DD):',hoje());
  if(!data||!data.match(/^\d{4}-\d{2}-\d{2}$/))return;
  const forcar=confirm(`Forçar revalidação completa de ${data}?\nOK = Forçar tudo · Cancelar = Só pendentes`);
  try{
    await fetch(`${B}/validar/${data}${forcar?'?forcar=true':''}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({forcar})});
    alert(`Validação de ${data} iniciada! Aguarde alguns minutos e atualize o dashboard.`);
  }catch(e){alert('Erro: '+e.message);}
}

async function validarHoje(forcar=false){
  const btn=document.getElementById('btn-hoje');
  btn.disabled=true;btn.textContent='⏳ Validando...';
  const agora=new Date(),brasilia=new Date(agora.getTime()-3*60*60*1000);
  const dataBrasilia=brasilia.toISOString().substring(0,10);
  try{
    await fetch(`${B}${forcar?`/validar/${dataBrasilia}?forcar=true`:'/validar-agora'}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({forcar})});
    await new Promise(r=>setTimeout(r,8000));
    const r=await fetch(`${B}/apostas-resultado/${hoje()}`);
    const d=await r.json();
    if(!d.apostas?.jogos?.length){
      document.getElementById('hoje-conteudo').innerHTML='<div class="empty">Sem apostas geradas para hoje ainda.</div>';
      return;
    }
    const ap=d.apostas.jogos,res=d.resultados?.apostas||[];
    const jogosComRes=ap.map(a=>{const rv=res.find(x=>x.jogo_id===a.id);return{...a,resultado:rv?.resultado_aposta||'pendente',placar:rv?.placar||null};});
    const g=jogosComRes.filter(j=>j.resultado==='green').length;
    const r2=jogosComRes.filter(j=>j.resultado==='red').length;
    const p=jogosComRes.filter(j=>j.resultado==='pendente').length;
    const tot=g+r2,pct=tot>0?Math.round(g/tot*100):null;
    document.getElementById('hoje-conteudo').innerHTML=`
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center"><div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;margin-bottom:4px">Total</div><div style="font-size:20px;font-weight:700">${ap.length}</div></div>
        <div style="background:var(--green-lt);border:1px solid var(--green-bd);border-radius:8px;padding:10px;text-align:center"><div style="font-size:10px;font-weight:600;color:var(--green);text-transform:uppercase;margin-bottom:4px">Green</div><div style="font-size:20px;font-weight:700;color:var(--green)">${g}</div></div>
        <div style="background:var(--red-lt);border:1px solid var(--red-bd);border-radius:8px;padding:10px;text-align:center"><div style="font-size:10px;font-weight:600;color:var(--red);text-transform:uppercase;margin-bottom:4px">Red</div><div style="font-size:20px;font-weight:700;color:var(--red)">${r2}</div></div>
        <div style="background:var(--amber-lt);border:1px solid var(--amber-bd);border-radius:8px;padding:10px;text-align:center"><div style="font-size:10px;font-weight:600;color:var(--amber);text-transform:uppercase;margin-bottom:4px">Pendente</div><div style="font-size:20px;font-weight:700;color:var(--amber)">${p}</div></div>
      </div>
      ${pct!==null?`<div style="font-size:12px;color:var(--text2);margin-bottom:10px">Assertividade até agora: <strong style="color:${corP(pct)}">${pct}%</strong></div>`:''}
      <div style="display:flex;flex-direction:column;gap:5px">
        ${jogosComRes.map(j=>`
          <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;gap:8px;border-left:3px solid ${j.resultado==='green'?'var(--green)':j.resultado==='red'?'var(--red)':'var(--border)'}">
            <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${j.time_casa} x ${j.time_fora}</div><div style="font-size:11px;color:var(--text2)">${j.aposta} · ${j.horario||''}</div></div>
            <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
              ${j.placar?`<span style="font-size:12px;font-weight:600;color:var(--text2)">${j.placar}</span>`:''}
              ${j.resultado==='green'?badgeG('✓ GREEN'):j.resultado==='red'?badgeR('✗ RED'):badgeP('⏳')}
            </div>
          </div>`).join('')}
      </div>`;
    btn.textContent='🔄 Atualizar';
  }catch(e){
    document.getElementById('hoje-conteudo').innerHTML=`<div class="empty" style="color:var(--red)">Erro: ${e.message}</div>`;
  }finally{btn.disabled=false;}
}

function calcularBanca(){
  const banca=parseFloat(document.getElementById('banca-valor').value)||50;
  if(!dadosGlobais.length)return;
  const h=hoje(),ontem=off(h,-1),sw=off(h,-6),sm=h.substring(0,8)+'01';
  let tInv=0,tRet=0,oInv=0,oRet=0,sInv=0,sRet=0,mInv=0,mRet=0;
  for(const dia of dadosGlobais){
    for(const a of dia.apostas||[]){
      const odd=parseFloat(a.odd_mercado||a.odd_sugerida)||0;if(!odd)continue;
      tInv+=banca;if(a.resultado==='green')tRet+=banca*odd;
      if(dia.data===ontem){oInv+=banca;if(a.resultado==='green')oRet+=banca*odd;}
      if(dia.data>=sw){sInv+=banca;if(a.resultado==='green')sRet+=banca*odd;}
      if(dia.data>=sm){mInv+=banca;if(a.resultado==='green')mRet+=banca*odd;}
    }
  }
  const fmt=(inv,ret)=>{const r=ret-inv;return`<span style="color:${r>=0?'var(--green)':'var(--red)'};font-weight:600">${r>=0?'+':''}R$ ${r.toFixed(2)}</span>`;};
  document.getElementById('b-investido').textContent='R$ '+tInv.toFixed(2);
  document.getElementById('b-retorno').textContent='R$ '+tRet.toFixed(2);
  document.getElementById('b-resultado').innerHTML=fmt(tInv,tRet);
  document.getElementById('b-ontem').innerHTML=oInv>0?fmt(oInv,oRet):'<span style="color:var(--text3)">sem dados</span>';
  document.getElementById('b-semana').innerHTML=sInv>0?fmt(sInv,sRet):'<span style="color:var(--text3)">sem dados</span>';
  document.getElementById('b-mes').innerHTML=mInv>0?fmt(mInv,mRet):'<span style="color:var(--text3)">sem dados</span>';
  document.getElementById('banca-resultado').style.display='block';
}

async function rotina(){
  const btn=document.getElementById('btn-r');
  btn.disabled=true;btn.querySelector('.admin-btn-label').textContent='⏳ Executando...';
  try{await fetch(`${B}/rotina-noturna`,{method:'POST'});btn.querySelector('.admin-btn-label').textContent='✅ Concluído!';}
  catch(e){btn.querySelector('.admin-btn-label').textContent='❌ Erro';}
  setTimeout(()=>{btn.disabled=false;btn.querySelector('.admin-btn-label').textContent='Rotina noturna';},3000);
}

async function sincronizarLigas(){
  const btn=document.getElementById('btn-sinc');
  btn.disabled=true;btn.querySelector('.admin-btn-label').textContent='⏳ Sincronizando...';
  try{
    await fetch(`${B}/sincronizar-ligas`,{method:'POST'});
    btn.querySelector('.admin-btn-label').textContent='✅ Sincronizado!';
  }catch(e){btn.querySelector('.admin-btn-label').textContent='❌ Erro';}
  setTimeout(()=>{btn.disabled=false;btn.querySelector('.admin-btn-label').textContent='Sincronizar ligas';},4000);
}

setInterval(async()=>{
  try{
    const r=await fetch(`${B}/apostas-resultado/${hoje()}`);
    const d=await r.json();if(!d.apostas?.jogos)return;
    const diasP=window._diasCache||[];
    const idx=diasP.findIndex(x=>x.data===hoje());
    if(idx!==-1){diasP[idx]=d;window._diasCache=diasP;renderDiario(diasP);}
  }catch(e){}
},3*60*1000);

load();

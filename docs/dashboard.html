<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dashboard · Estrela Bet</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080a0f;--s1:#0e1118;--s2:#141720;--s3:#1c2030;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);--text:#e8eaf2;--text2:#7a7f9a;--text3:#3a3f58;--green:#00e676;--red:#ff1744;--amber:#ffab00;--blue:#448aff;--purple:#e040fb;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Bebas Neue',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding-bottom:70px;}
.nav-top{display:flex;align-items:center;justify-content:space-between;padding:0 1rem;height:52px;background:var(--s1);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-logo-icon{width:28px;height:28px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.nav-logo-icon svg{width:13px;height:13px;color:#000;}
.nav-logo-name{font-size:14px;font-weight:600;color:var(--text);}
.nav-logo-name span{color:var(--green);}
.nav-badge{font-size:10px;font-family:var(--mono);background:rgba(0,230,118,.08);color:var(--green);border:1px solid rgba(0,230,118,.2);padding:4px 10px;border-radius:20px;}
.nav-bottom{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--s1);border-top:1px solid var(--border);display:flex;}
.nav-bottom a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;text-decoration:none;color:var(--text3);font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.06em;gap:4px;transition:color .15s;border-top:2px solid transparent;}
.nav-bottom a svg{width:18px;height:18px;}
.nav-bottom a.active{color:var(--green);border-top-color:var(--green);}
.page{padding:1rem;}

/* SAÚDE PERÍODOS */
.saude-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.saude-card{background:var(--s1);border:1px solid var(--border2);border-radius:12px;padding:14px;position:relative;overflow:hidden;}
.saude-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.sc-ontem::before{background:linear-gradient(90deg,var(--blue),transparent);}
.sc-semana::before{background:linear-gradient(90deg,var(--green),transparent);}
.sc-mes::before{background:linear-gradient(90deg,var(--purple),transparent);}
.s-lbl{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:6px;}
.s-pct{font-family:var(--display);font-size:36px;letter-spacing:1px;line-height:1;margin-bottom:4px;}
.s-pct.good{color:var(--green);}
.s-pct.ok{color:var(--amber);}
.s-pct.bad{color:var(--red);}
.s-pct.empty{color:var(--text3);}
.s-detail{display:flex;gap:8px;}
.s-d{font-family:var(--mono);font-size:10px;color:var(--text2);}
.s-d strong{display:block;font-size:13px;}

/* BANNER GERAL */
.health-banner{background:var(--s1);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:1rem;position:relative;overflow:hidden;}
.health-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),transparent);}
.h-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:8px;}
.h-pct{font-family:var(--display);font-size:56px;letter-spacing:2px;line-height:1;}
.h-lbl{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:4px;}
.h-sub{font-size:11px;color:var(--text2);font-family:var(--mono);}
.top3-title{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:8px;margin-top:12px;}
.top3-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.top3-rank{font-family:var(--display);font-size:16px;color:var(--text3);width:16px;}
.top3-info{flex:1;}
.top3-name{font-size:12px;font-weight:500;display:flex;justify-content:space-between;margin-bottom:3px;}
.top3-bar{height:3px;background:var(--s3);border-radius:2px;overflow:hidden;}
.top3-fill{height:100%;border-radius:2px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:1rem;}
.stat-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.stat-lbl{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:4px;}
.stat-val{font-family:var(--display);font-size:32px;letter-spacing:1px;}

/* SECTION */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.sec-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);}
.btn-manual{font-family:var(--mono);font-size:10px;padding:6px 12px;border-radius:6px;border:1px solid rgba(255,171,0,.3);background:rgba(255,171,0,.06);color:var(--amber);cursor:pointer;}
.btn-manual:disabled{opacity:.4;}

/* DAILY */
.daily-item{background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:8px;}
.daily-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;}
.daily-date{font-family:var(--mono);font-size:11px;color:var(--text2);width:70px;flex-shrink:0;}
.daily-bar-wrap{flex:1;}
.daily-bar{height:3px;background:var(--s3);border-radius:2px;overflow:hidden;}
.daily-bar-fill{height:100%;border-radius:2px;}
.daily-pct{font-family:var(--display);font-size:20px;width:50px;text-align:right;flex-shrink:0;}
.daily-gr{display:flex;gap:8px;flex-shrink:0;}
.daily-g{font-family:var(--mono);font-size:11px;color:var(--green);}
.daily-r{font-family:var(--mono);font-size:11px;color:var(--red);}
.daily-chev{color:var(--text3);font-size:10px;flex-shrink:0;transition:transform .2s;}
.daily-chev.open{transform:rotate(180deg);}
.daily-apostas{display:none;border-top:1px solid var(--border);}
.daily-apostas.open{display:block;}
.ap-row{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.ap-row:last-child{border-bottom:none;}
.ap-left{flex:1;}
.ap-jogo{font-size:12px;font-weight:500;}
.ap-meta{font-size:10px;color:var(--text2);font-family:var(--mono);margin-top:2px;}
.ap-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ap-odd{font-family:var(--mono);font-size:11px;color:var(--amber);}
.rbadge{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:20px;}
.r-green{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.2);}
.r-red{background:rgba(255,23,68,.1);color:var(--red);border:1px solid rgba(255,23,68,.2);}
.r-pend{background:rgba(255,171,0,.08);color:var(--amber);border:1px solid rgba(255,171,0,.18);}

.loading{text-align:center;padding:3rem;}
.spin{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 8px;}
.empty{text-align:center;padding:2rem;color:var(--text3);font-family:var(--mono);font-size:11px;}
@keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>

  <a class="nav-logo" href="index.html">

<div class="page">
  <div class="saude-grid" id="saude-grid">
    <div class="saude-card sc-ontem"><div class="s-lbl">Ontem</div><div class="s-pct empty">--</div></div>

  <!-- GESTÃO DE BANCA -->
  <div style="background:var(--s1);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:1rem;position:relative;overflow:hidden;">
    <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--amber),transparent)"></div>
    <div style="font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);margin-bottom:12px">💰 Gestão de banca</div>
    <div style="display:flex;gap:8px;align-items:flex-end;margin-bottom:14px;flex-wrap:wrap;">
      <div style="flex:1;min-width:120px;">
        <div style="font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;margin-bottom:4px">Valor por aposta (R$)</div>

    <div id="banca-resultado" style="display:none;">

        <div style="background:var(--s2);border-radius:8px;padding:10px;">
          <div style="font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;margin-bottom:4px">Investido</div>

          <div style="font-family:var(--mono);font-size:15px;font-weight:600;" id="b-resultado">-</div>
        </div>

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
        <div style="background:var(--s2);border-radius:8px;padding:10px;">
          <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:4px">Ontem</div>
          <div style="font-family:var(--mono);font-size:13px;font-weight:600;" id="b-ontem">-</div>
        </div>

          <div style="font-family:var(--mono);font-size:13px;font-weight:600;" id="b-mes">-</div>
        </div>

  <!-- ACOMPANHAMENTO DO DIA -->
  <div style="background:var(--s1);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:1rem;position:relative;overflow:hidden;">
    <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),transparent)"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div style="font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);">📡 Hoje em tempo real</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button id="btn-hoje" onclick="validarHoje(false)" style="font-family:var(--mono);font-size:10px;padding:6px 12px;border-radius:6px;border:1px solid rgba(68,138,255,.3);background:rgba(68,138,255,.08);color:var(--blue);cursor:pointer;">
          🔄 Atualizar
        </button>
        <button onclick="validarHoje(true)" style="font-family:var(--mono);font-size:10px;padding:6px 12px;border-radius:6px;border:1px solid rgba(255,171,0,.3);background:rgba(255,171,0,.08);color:var(--amber);cursor:pointer;" title="Revalida todos os jogos do zero">
          ⚡ Forçar
        </button>
        <button onclick="validarDataEspecifica()" style="font-family:var(--mono);font-size:10px;padding:6px 12px;border-radius:6px;border:1px solid rgba(110,231,183,.3);background:rgba(110,231,183,.08);color:var(--green);cursor:pointer;" title="Validar uma data específica">
          📅 Data específica
        </button>

    <div id="hoje-conteudo">
      <div style="font-family:var(--mono);font-size:11px;color:var(--text3);text-align:center;padding:1rem;">
        Clique em "Atualizar resultados" para ver os jogos de hoje
      </div>

  <div class="sec-header">
    <span class="sec-title">Histórico</span>
    <button class="btn-manual" id="btn-r" onclick="rotina()">⚡ Rotina manual</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="switchHist('dias')" id="hist-btn-dias" style="font-family:var(--mono);font-size:11px;padding:4px 14px;border-radius:20px;cursor:pointer;background:var(--green);color:#000;border:none;font-weight:600">dias</button>
    <button onclick="switchHist('semanas')" id="hist-btn-semanas" style="font-family:var(--mono);font-size:11px;padding:4px 14px;border-radius:20px;cursor:pointer;background:transparent;color:var(--text3);border:1px solid var(--border)">semanas</button>

  <a href="ligas.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>Ligas</a>

<script>
const B='https://apostas-app.onrender.com';
let dadosGlobais=[];

function corP(p){return p>=80?'var(--green)':p>=60?'var(--amber)':'var(--red)';}
function cP(p){return p>=80?'good':p>=60?'ok':'bad';}
function hoje(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function off(b,n){const d=new Date(b+'T12:00:00');d.setDate(d.getDate()+n);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmtDL(iso){const[a,m,d]=iso.split('-');return `${d}/${m}/${a}`;}

async function load(){
  const h=hoje(),ps=[];
  for(let i=0;i<30;i++) ps.push(
    fetch(`${B}/apostas-resultado/${off(h,-i)}`).then(r=>r.ok?r.json():null).catch(()=>null)
    .then(async d => {
      if(!d?.apostas) return null;
      // Buscar múltiplas do dia
      try {
        const m=await fetch(`${B}/multiplas/${off(h,-i)}`).then(r=>r.ok?r.json():null);
        if(m) { d.multiplas=m.multiplas; d.resultados_multiplas=m.resultados_multiplas; }
      } catch(e){}
      return d;
    })
  );
  const dias=(await Promise.all(ps)).filter(d=>d&&d.apostas);
  processar(dias,h);
}

function processar(dias,h){
  let tG=0,tR=0,tT=0;
  const ligasMap={};
  const ontem=off(h,-1),sm=h.substring(0,8)+'01';
  // Semana: de segunda a domingo
  const hoje_d = new Date(h+'T12:00:00');
  const diaSem = hoje_d.getDay(); // 0=dom,1=seg,...,6=sab
  const diasDesdeSegunda = diaSem === 0 ? 6 : diaSem - 1; // domingo = 6 dias desde segunda
  const sw = off(h, -diasDesdeSegunda); // início da semana atual (segunda)
  let oG=0,oR=0,sG=0,sR=0,mG=0,mR=0;
  // Múltiplas
  let mAG=0,mAR=0,mBG=0,mBR=0,mAP=0,mBP=0;
  dadosMultiplasDias=[];
  const diasP=[];

  for(const dia of dias){
    const ap=dia.apostas?.jogos||[],res=dia.resultados?.apostas||[];
    let dG=0,dR=0,dP=0;
    const apR=ap.map(a=>{
      const r=res.find(x=>x.jogo_id===a.id);
      const rv=r?.resultado_aposta||'pendente';
      if(rv==='green'){dG++;tG++;}else if(rv==='red'){dR++;tR++;}else if(rv==='cancelado'){/* reembolso — não conta */}else dP++;
      const lg=a.liga||'Outras';
      if(!ligasMap[lg])ligasMap[lg]={green:0,red:0,total:0};
      if(rv==='green')ligasMap[lg].green++;else if(rv==='red')ligasMap[lg].red++;
      if(rv!=='pendente')ligasMap[lg].total++;
      return{...a,resultado:rv,placar:r?.placar||null};
    });
    tT+=ap.length;
    const dt=dG+dR,da=dt>0?Math.round(dG/dt*100):null;
    if(dia.data===ontem){oG+=dG;oR+=dR;}
    if(dia.data>=sw){sG+=dG;sR+=dR;}
    if(dia.data>=sm){mG+=dG;mR+=dR;}

    // Contar múltiplas — só conta no mês atual para os totais
    const rM=dia.resultados_multiplas;
    const rA = rM?.multipla_a?.resultado || (dia.multiplas?.multipla_a ? 'pendente' : null);
    const rB = rM?.multipla_b?.resultado || (dia.multiplas?.multipla_b ? 'pendente' : null);
    if(dia.data>=sm){
      if(rA==='green') mAG++; else if(rA==='red') mAR++; else if(rA) mAP++;
      if(rB==='green') mBG++; else if(rB==='red') mBR++; else if(rB) mBP++;
    }
    // Guardar TODOS os dias para histórico (separado por mês no render)
    if(rA || rB) dadosMultiplasDias.push({ data: dia.data, rA, rB });

    diasP.push({data:dia.data,apostas:apR,green:dG,red:dR,pendente:dP,total:ap.length,assert:da,multiplas:dia.multiplas,resultados_multiplas:rM});
  }

  const tv=tG+tR,ag=tv>0?Math.round(tG/tv*100):null;
  const ligas=Object.entries(ligasMap).filter(([,v])=>v.total>=1).map(([n,v])=>({nome:n,...v,pct:Math.round(v.green/v.total*100)})).sort((a,b)=>b.pct-a.pct);
  const saude={ontem:{g:oG,r:oR,pct:oG+oR>0?Math.round(oG/(oG+oR)*100):null},semana:{g:sG,r:sR,pct:sG+sR>0?Math.round(sG/(sG+sR)*100):null},mes:{g:mG,r:mR,pct:mG+mR>0?Math.round(mG/(mG+mR)*100):null}};
  const multiplas={a:{green:mAG,red:mAR,pendente:mAP,total:mAG+mAR},b:{green:mBG,red:mBR,pendente:mBP,total:mBG+mBR}};

  // Agrupar por semana (segunda a domingo)
  const semanasMap = {};
  const mesesMap = {};
  for(const dia of diasP) {
    // Calcular início da semana (segunda)
    const d = new Date(dia.data+'T12:00:00');
    const ds = d.getDay();
    const diasSeg = ds === 0 ? 6 : ds - 1;
    const segData = new Date(d); segData.setDate(d.getDate() - diasSeg);
    const swKey = segData.toISOString().substring(0,10);
    // Fim da semana (domingo)
    const domData = new Date(segData); domData.setDate(segData.getDate() + 6);
    const domKey = domData.toISOString().substring(0,10);
    const swLabel = `${fmtD(swKey)} – ${fmtD(domKey)}`;

    if(!semanasMap[swKey]) semanasMap[swKey] = {label:swLabel,g:0,r:0,c:0,dias:[]};
    semanasMap[swKey].g += dia.green;
    semanasMap[swKey].r += dia.red;
    semanasMap[swKey].dias.push(dia);

    // Agrupar por mês
    const mesKey = dia.data.substring(0,7);
    const [my,mm] = mesKey.split('-');
    const meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    const mesLabel = `${meses[parseInt(mm)-1]} ${my}`;
    if(!mesesMap[mesKey]) mesesMap[mesKey] = {label:mesLabel,g:0,r:0,c:0,dias:[]};
    mesesMap[mesKey].g += dia.green;
    mesesMap[mesKey].r += dia.red;
    mesesMap[mesKey].dias.push(dia);
  }

  dadosGlobais=diasP;
  window._diasCache=diasP;
  renderSaude(saude);renderHealth(ag,ligas,tG,tR);renderStats(ag,tT,tG,tR,multiplas);renderDiario(diasP);
  renderPeriodos(semanasMap, mesesMap);
}

    const [y,mo] = m.split('-');
    const nomes = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    return `${nomes[parseInt(mo)-1]} ${y}`;

  el.innerHTML = Object.entries(meses).sort((a,b)=>b[0].localeCompare(a[0])).map(([mes, dias]) => {

    const bGs = dias.filter(d=>d.rB==='green').length;

      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border-radius:4px;background:var(--card2);margin-bottom:2px">

        <div style="display:flex;gap:12px;font-family:var(--mono);font-size:10px">
          <span>A: <span style="color:var(--green)">${aGs}G</span> <span style="color:var(--red)">${aRs}R</span></span>

}

OK = Forçar tudo

  const agora = new Date();
  const brasilia = new Date(agora.getTime() - 3*60*60*1000);
  const dataBrasilia = brasilia.toISOString().substring(0,10);

  try{
    // Disparar validação com data de Brasília
    const endpoint = forcar ? `/validar/${dataBrasilia}?forcar=true` : `/validar-agora`;
    await fetch(`${B}${endpoint}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({forcar})});

    // Aguardar 8 segundos e buscar resultado atualizado
    await new Promise(r=>setTimeout(r,8000));

          <div style="font-family:var(--mono);font-size:18px;font-weight:600;color:var(--green)">${g}</div>
        </div>
        <div style="background:var(--s2);border-radius:8px;padding:10px;text-align:center;">
          <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:4px">Red</div>
          <div style="font-family:var(--mono);font-size:18px;font-weight:600;color:var(--red)">${r2}</div>
        </div>
        <div style="background:var(--s2);border-radius:8px;padding:10px;text-align:center;">
          <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:4px">Pendente</div>
          <div style="font-family:var(--mono);font-size:18px;font-weight:600;color:var(--amber)">${p}</div>
        </div>
      </div>
      ${pct!==null?`<div style="font-family:var(--mono);font-size:11px;color:var(--text2);margin-bottom:10px;">Assertividade até agora: <strong style="color:${corP(pct)}">${pct}%</strong></div>`:''}
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${jogosComRes.map(j=>`
          <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--s2);border-radius:8px;gap:8px;${j.resultado==='green'?'border-left:2px solid var(--green)':j.resultado==='red'?'border-left:2px solid var(--red)':'border-left:2px solid var(--s3)'}">
            <div style="flex:1;min-width:0;">
              <div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${j.time_casa} x ${j.time_fora}</div>
              <div style="font-size:10px;color:var(--text2);font-family:var(--mono);">${j.aposta} · ${j.horario||''}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
              ${j.placar?`<span style="font-family:var(--mono);font-size:11px;color:var(--text2)">${j.placar}</span>`:''}
              <span style="font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:20px;${j.resultado==='green'?'background:rgba(0,230,118,.12);color:var(--green);border:1px solid rgba(0,230,118,.25)':j.resultado==='red'?'background:rgba(255,23,68,.12);color:var(--red);border:1px solid rgba(255,23,68,.25)':'background:rgba(255,171,0,.08);color:var(--amber);border:1px solid rgba(255,171,0,.2)'}">

function calcularBanca(){
  const banca=parseFloat(document.getElementById('banca-valor').value)||50;
  if(!dadosGlobais.length) return;

  const h=hoje(),ontem=off(h,-1),sw=off(h,-6),sm=h.substring(0,8)+'01';
  let tInv=0,tRet=0,oInv=0,oRet=0,sInv=0,sRet=0,mInv=0,mRet=0;

  for(const dia of dadosGlobais){
    const ap=dia.apostas||[];
    for(const a of ap){
      const odd=parseFloat(a.odd_mercado||a.odd_sugerida)||0;
      if(!odd) continue;
      tInv+=banca;
      if(a.resultado==='green') tRet+=banca*odd;
      // Por período
      if(dia.data===ontem){oInv+=banca;if(a.resultado==='green')oRet+=banca*odd;}
      if(dia.data>=sw){sInv+=banca;if(a.resultado==='green')sRet+=banca*odd;}
      if(dia.data>=sm){mInv+=banca;if(a.resultado==='green')mRet+=banca*odd;}
    }
  }

  const fmt=(inv,ret)=>{
    const r=ret-inv;
    const cor=r>=0?'var(--green)':'var(--red)';
    return `<span style="color:${cor}">${r>=0?'+':''}R$ ${r.toFixed(2)}</span>`;
  };

  document.getElementById('b-investido').textContent='R$ '+tInv.toFixed(2);
  document.getElementById('b-retorno').textContent='R$ '+tRet.toFixed(2);
  document.getElementById('b-resultado').innerHTML=fmt(tInv,tRet);
  document.getElementById('b-resultado').style.color='';
  document.getElementById('b-ontem').innerHTML=oInv>0?fmt(oInv,oRet):'<span style="color:var(--text3)">sem dados</span>';
  document.getElementById('b-semana').innerHTML=sInv>0?fmt(sInv,sRet):'<span style="color:var(--text3)">sem dados</span>';
  document.getElementById('b-mes').innerHTML=mInv>0?fmt(mInv,mRet):'<span style="color:var(--text3)">sem dados</span>';
  document.getElementById('banca-resultado').style.display='block';
}

async function rotina(){
  const btn=document.getElementById('btn-r');
  btn.disabled=true;btn.textContent='⏳...';
  try{await fetch(`${B}/rotina-noturna`,{method:'POST'});btn.textContent='✅ Ok!';}
  catch(e){btn.textContent='❌';}
  setTimeout(()=>{btn.disabled=false;btn.textContent='⚡ Rotina manual';},3000);
}

load();
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatórios · OddLab</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#F0EDEA;min-height:100vh;color:#1E293B;}

/* NAV */
.nav{position:sticky;top:0;z-index:200;height:46px;background:#FAF7F2;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;padding:0 24px;}
.nav-brand{font-size:14px;font-weight:700;color:#1E293B;letter-spacing:-0.4px;margin-right:24px;text-decoration:none;flex-shrink:0;}
.nav-brand span{color:#0F766E;font-weight:300;}
.nav-links{display:flex;align-items:center;flex:1;overflow-x:auto;}
.nl{padding:0 13px;height:46px;display:flex;align-items:center;font-size:12px;font-weight:500;color:#94A3B8;text-decoration:none;transition:color .12s;white-space:nowrap;border-bottom:2px solid transparent;}
.nl:hover{color:#475569;}
.nl.a{color:#0F766E;border-bottom-color:#0F766E;font-weight:600;}

/* PAGE */
.page{padding:28px 28px 40px;max-width:900px;margin:0 auto;}
.page-hd{margin-bottom:22px;}
.page-title{font-size:22px;font-weight:800;color:#1E293B;letter-spacing:-0.5px;margin-bottom:3px;}
.page-sub{font-size:13px;color:#94A3B8;font-weight:300;}

/* GRUPO (tipo de relatório) */
.grupo{margin-bottom:24px;}
.grupo-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.grupo-hd-line{flex:1;height:1px;background:#E2E8F0;}
.grupo-hd-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94A3B8;white-space:nowrap;}
.grupo-count{font-size:10px;font-weight:600;color:#94A3B8;background:#F1F5F9;border:1px solid #E2E8F0;border-radius:20px;padding:1px 7px;}

/* REPORT CARD */
.rel-card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;overflow:hidden;margin-bottom:8px;transition:border-color .15s;}
.rel-card:hover{border-color:#CBD5E1;}
.rel-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;gap:12px;}
.rel-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0;}
.rel-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.ico-d{background:#EFF6FF;} .ico-w{background:#F0FDF9;} .ico-m{background:#F5F3FF;} .ico-s{background:#FFFBEB;}
.rel-meta{flex:1;min-width:0;}
.rel-titulo{font-size:13px;font-weight:600;color:#1E293B;margin-bottom:3px;}
.rel-periodo{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.tipo-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:20px;}
.tb-d{background:#EFF6FF;color:#2563EB;border:1px solid #BFDBFE;}
.tb-w{background:#F0FDF9;color:#0F766E;border:1px solid #99F6E4;}
.tb-m{background:#F5F3FF;color:#7C3AED;border:1px solid #DDD6FE;}
.tb-s{background:#FFFBEB;color:#D97706;border:1px solid #FDE68A;}
.rel-data{font-size:11px;color:#94A3B8;}
.rel-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.assert-badge{font-size:16px;font-weight:800;padding:3px 10px;border-radius:8px;}
.ab-good{color:#0F766E;background:#F0FDF9;}
.ab-ok{color:#D97706;background:#FFFBEB;}
.ab-bad{color:#DC2626;background:#FEF2F2;}
.btn-pdf{font-size:10px;font-weight:600;padding:4px 10px;border-radius:6px;border:1px solid #E2E8F0;background:#F8FAFC;color:#475569;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap;}
.btn-pdf:hover{border-color:#CBD5E1;background:#F1F5F9;color:#1E293B;}
.rel-chev{color:#CBD5E1;font-size:12px;transition:transform .2s;flex-shrink:0;}
.rel-chev.open{transform:rotate(180deg);color:#0F766E;}

/* REPORT BODY */
.rel-body{display:none;border-top:1px solid #E2E8F0;}
.rel-body.open{display:block;}

/* SECTIONS */
.sec{padding:14px 16px;border-bottom:1px solid #F1F5F9;}
.sec:last-child{border-bottom:none;}
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.sec-icon{font-size:14px;line-height:1;}
.sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:2px 8px;border-radius:4px;}
.sl-blue{background:#EFF6FF;color:#2563EB;}
.sl-green{background:#F0FDF9;color:#0F766E;}
.sl-amber{background:#FFFBEB;color:#D97706;}
.sl-purple{background:#F5F3FF;color:#7C3AED;}
.sl-gray{background:#F1F5F9;color:#64748B;}
.sec-text{font-size:13px;color:#475569;line-height:1.8;white-space:pre-wrap;}

/* raw fallback */
.rel-raw{padding:16px;font-size:13px;color:#475569;line-height:1.9;white-space:pre-wrap;background:#F8FAFC;}

/* STATES */
.loading{text-align:center;padding:3rem;}
.spin{width:24px;height:24px;border:2px solid #E2E8F0;border-top-color:#0F766E;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 8px;}
.empty{text-align:center;padding:3rem;color:#94A3B8;font-size:12px;line-height:1.8;}
@keyframes sp{to{transform:rotate(360deg);}}
.bottom-nav{display:none;}
@media(max-width:900px){
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:300;background:#fff;border-top:1px solid #E2E8F0;height:56px;align-items:stretch;}
  .bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:9px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:#94A3B8;text-decoration:none;transition:color .12s;border-top:2px solid transparent;padding-bottom:2px;}
  .bottom-nav a svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .bottom-nav a.active{color:#0F766E;border-top-color:#0F766E;}
  body{padding-bottom:60px;}
}
</style>
</head>
<body>

    <a class="nl a" href="relatorios.html">Relatórios</a>
    <a class="nl" href="experimental.html">Experimental</a>
    <a class="nl" href="aluno.html">Aluno</a>
  </div>

<div class="page">
  <div class="page-hd">
    <div class="page-title">Relatórios de calibração</div>
    <div class="page-sub">Memória de aprendizado da IA · atualiza automaticamente após cada ciclo noturno</div>
  </div>
  <div id="conteudo">
    <div class="loading"><div class="spin"></div><div style="font-size:12px;color:#94A3B8;margin-top:4px">Carregando relatórios...</div></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const B='https://apostas-app.onrender.com';

// ── Metadados por tipo ──────────────────────────────────────────────────────
const tipoMeta={
  s:{label:'Semestral',icon:'🗓️',iconCls:'ico-s',badgeCls:'tb-s'},
  m:{label:'Mensal',   icon:'📆',iconCls:'ico-m',badgeCls:'tb-m'},
  w:{label:'Semanal',  icon:'📅',iconCls:'ico-w',badgeCls:'tb-w'},
  d:{label:'Diário',   icon:'📊',iconCls:'ico-d',badgeCls:'tb-d'},
};

// ── Seções conhecidas do relatório estruturado ──────────────────────────────
const SECOES=[
  {chave:'O QUE FIZ',          label:'O que foi feito',      icon:'✅',cls:'sl-blue'},
  {chave:'PADRÃO IDENTIFICADO', label:'Padrão identificado',  icon:'🔍',cls:'sl-amber'},
  {chave:'INSTRUÇÃO PARA AMANHÃ',label:'Instrução para amanhã',icon:'🎯',cls:'sl-green'},
  {chave:'INSTRUÇÃO PARA AMANHA',label:'Instrução para amanhã',icon:'🎯',cls:'sl-green'},
  {chave:'ASSERTIVIDADE',       label:'Assertividade',         icon:'📊',cls:'sl-green'},
  {chave:'MERCADOS',            label:'Mercados',              icon:'📈',cls:'sl-blue'},
  {chave:'LIGAS',               label:'Ligas',                 icon:'🏆',cls:'sl-amber'},
  {chave:'MÚLTIPLAS',           label:'Múltiplas',             icon:'🎲',cls:'sl-purple'},
  {chave:'MULTIPLAS',           label:'Múltiplas',             icon:'🎲',cls:'sl-purple'},
  {chave:'AÇÕES',               label:'Ações',                 icon:'⚡',cls:'sl-purple'},
  {chave:'ACOES',               label:'Ações',                 icon:'⚡',cls:'sl-purple'},
  {chave:'RESUMO',              label:'Resumo',                icon:'📋',cls:'sl-gray'},
];

function normChave(s){return(s||'').toUpperCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim();}

function parseSecoes(texto){
  if(!texto) return null;

  // Construir regex que detecta linhas que são exatamente um cabeçalho conhecido
  const chaves=SECOES.map(s=>normChave(s.chave));
  // Procura linhas que, após normalização, batem com alguma chave (com ou sem : no final)
  const linhas=texto.split('\n');
  const secoes=[];
  let secAtual=null;
  let temSecao=false;

  for(const linha of linhas){
    const norm=normChave(linha.replace(/:+\s*$/,''));
    const meta=SECOES.find(s=>normChave(s.chave)===norm);
    if(meta){
      if(secAtual) secoes.push({...secAtual,texto:secAtual.texto.trim()});
      secAtual={label:meta.label,icon:meta.icon,cls:meta.cls,texto:''};
      temSecao=true;
    } else if(secAtual){
      secAtual.texto+=linha+'\n';
    } else {
      // Texto antes da primeira seção
      if(!secoes.length||secoes[0].label!==null){
        if(!secAtual) secAtual={label:null,icon:'📋',cls:'sl-gray',texto:''};
        secAtual.texto+=linha+'\n';
      }
    }
  }
  if(secAtual&&secAtual.texto.trim()) secoes.push({...secAtual,texto:secAtual.texto.trim()});

  return temSecao?secoes:null;
}

function renderBody(texto){
  const secoes=parseSecoes(texto);
  if(!secoes){
    // Sem estrutura conhecida — exibe raw com estilo legível
    return`<div class="rel-raw">${escHtml(texto)}</div>`;
  }
  return secoes.map(s=>{
    if(!s.label){
      // Intro sem cabeçalho
      return s.texto?`<div class="sec"><div class="sec-text">${escHtml(s.texto)}</div></div>`:'';
    }
    return`<div class="sec">
      <div class="sec-hd">
        <span class="sec-icon">${s.icon}</span>
        <span class="sec-label ${s.cls}">${s.label}</span>
      </div>
      <div class="sec-text">${escHtml(s.texto)}</div>
    </div>`;
  }).join('');
}

function escHtml(s){
  return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtD(iso){if(!iso)return'-';const[a,m,d]=iso.split('-');return`${d}/${m}/${a}`;}
function corP(p){return p>=80?'ab-good':p>=60?'ab-ok':'ab-bad';}

// ── Toggle expand ───────────────────────────────────────────────────────────
function tog(id){
  document.getElementById('b'+id).classList.toggle('open');
  const ch=document.getElementById('c'+id);
  ch.classList.toggle('open');
  ch.textContent=ch.classList.contains('open')?'▲':'▼';
}

// ── Exportar PDF ────────────────────────────────────────────────────────────
function exportarPDF(id,titulo,texto,periodo,assertividade){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=doc.internal.pageSize.getWidth();
  const margin=18;
  const maxW=W-margin*2;
  let y=margin;

  // Cabeçalho
  doc.setFont('helvetica','bold');
  doc.setFontSize(16);
  doc.setTextColor(15,118,110);
  doc.text('OddLab',margin,y);
  y+=7;
  doc.setFont('helvetica','bold');
  doc.setFontSize(13);
  doc.setTextColor(30,41,59);
  doc.text(titulo,margin,y);
  y+=6;
  doc.setFont('helvetica','normal');
  doc.setFontSize(9);
  doc.setTextColor(148,163,184);
  doc.text(periodo,margin,y);
  if(assertividade!=null){
    doc.setTextColor(15,118,110);
    doc.text(`Assertividade: ${assertividade}%`,W-margin,y,{align:'right'});
  }
  y+=8;
  // Linha separadora
  doc.setDrawColor(226,232,240);
  doc.line(margin,y,W-margin,y);
  y+=8;

  const secoes=parseSecoes(texto);
  const addTexto=(t,cor=[71,85,105])=>{
    doc.setFont('helvetica','normal');
    doc.setFontSize(10);
    doc.setTextColor(...cor);
    const linhas=doc.splitTextToSize(t,maxW);
    for(const ln of linhas){
      if(y>275){doc.addPage();y=margin;}
      doc.text(ln,margin,y);
      y+=5;
    }
  };

  if(!secoes){
    addTexto(texto||'');
  } else {
    for(const s of secoes){
      if(!s.label){
        addTexto(s.texto);
        y+=3;
        continue;
      }
      if(y>260){doc.addPage();y=margin;}
      // Cabeçalho de seção
      doc.setFont('helvetica','bold');
      doc.setFontSize(9);
      doc.setTextColor(100,116,139);
      doc.text((s.icon+' '+s.label).toUpperCase(),margin,y);
      y+=5;
      // Linha fina
      doc.setDrawColor(241,245,249);
      doc.line(margin,y,W-margin,y);
      y+=4;
      addTexto(s.texto);
      y+=5;
    }
  }

  const nomeArq=`oddlab-${id}-${new Date().toISOString().substring(0,10)}.pdf`;
  doc.save(nomeArq);
}

// ── Render de grupo ─────────────────────────────────────────────────────────
function renderGrupo(items,tipo){
  if(!items?.length) return'';
  const meta=tipoMeta[tipo];
  return`<div class="grupo">
    <div class="grupo-hd">
      <div class="grupo-hd-line"></div>
      <span class="grupo-hd-label">${meta.label}</span>
      <span class="grupo-count">${items.length}</span>
      <div class="grupo-hd-line"></div>
    </div>
    ${items.map((r,i)=>{
      const id=tipo+i;
      const pct=r.assertividade;
      const assertHtml=pct!=null?`<span class="assert-badge ${corP(pct)}">${pct}%</span>`:'';
      const periodo=fmtD(r.periodo_inicio)+(r.periodo_fim&&r.periodo_fim!==r.periodo_inicio?' → '+fmtD(r.periodo_fim):'');
      const periodoRaw=r.periodo_inicio+(r.periodo_fim&&r.periodo_fim!==r.periodo_inicio?' → '+r.periodo_fim:'');
      const titulo=`${meta.label} · ${periodo}`;
      const textoEsc=(r.relatorio||'').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/"/g,'&quot;');
      return`<div class="rel-card">
        <div class="rel-hd" onclick="tog('${id}')">
          <div class="rel-left">
            <div class="rel-icon ${meta.iconCls}">${meta.icon}</div>
            <div class="rel-meta">
              <div class="rel-titulo">${titulo}</div>
              <div class="rel-periodo">
                <span class="tipo-badge ${meta.badgeCls}">${meta.icon} ${meta.label}</span>
                <span class="rel-data">${periodoRaw}</span>
              </div>
            </div>
          </div>
          <div class="rel-right">
            ${assertHtml}
            <button class="btn-pdf" onclick="event.stopPropagation();exportarPDF('${id}','${titulo.replace(/'/g,"\\'")}',document.getElementById('raw${id}').textContent,'${periodoRaw}',${pct??'null'})" title="Exportar PDF">⬇ PDF</button>
            <span class="rel-chev" id="c${id}">▼</span>
          </div>
        </div>
        <div class="rel-body" id="b${id}">
          <pre id="raw${id}" style="display:none">${escHtml(r.relatorio||'')}</pre>
          ${renderBody(r.relatorio||'')}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// ── Init ────────────────────────────────────────────────────────────────────
async function init(){
  try{
    const r=await fetch(`${B}/calibracao-todos`);
    if(!r.ok) throw new Error('Erro '+r.status);
    const d=await r.json();
    const html=[
      renderGrupo(d.semestrais,'s'),
      renderGrupo(d.mensais,'m'),
      renderGrupo(d.semanais,'w'),
      renderGrupo(d.diarios,'d'),
    ].join('');
    document.getElementById('conteudo').innerHTML=html||`<div class="empty">
      <div style="font-size:32px;margin-bottom:8px">📭</div>
      <div style="font-weight:600;color:#475569;margin-bottom:4px">Nenhum relatório ainda</div>
      <div>A IA gera relatórios após a primeira rotina noturna.<br>Volte amanhã cedo.</div>
    </div>`;
  }catch(e){
    document.getElementById('conteudo').innerHTML=`<div class="empty" style="color:#DC2626">Erro ao carregar relatórios.<br><small>${e.message}</small></div>`;
  }
}
init();
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apostas · OddLab</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F0EDEA;--surface:#FFFFFF;--surface2:#FAF7F2;
  --border:#E2E8F0;--border2:#CBD5E1;
  --text:#1E293B;--text2:#475569;--text3:#94A3B8;
  --green:#0F766E;--green-lt:#F0FDF9;--green-bd:#99F6E4;
  --red:#DC2626;--red-lt:#FEF2F2;--red-bd:#FECACA;
  --amber:#D97706;--amber-lt:#FFFBEB;--amber-bd:#FDE68A;
  --purple:#7C3AED;--purple-lt:#F5F3FF;--purple-bd:#DDD6FE;
  --nav-h:46px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}

/* ── Nav ──────────────────────────────────────────── */
.nav{position:sticky;top:0;z-index:200;height:var(--nav-h);background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;}
.nav-brand{display:flex;align-items:center;gap:0;text-decoration:none;flex-shrink:0;margin-right:24px;}
.nav-brand-name{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-0.4px;}
.nav-brand-name span{color:var(--green);font-weight:300;}
.nav-links{display:flex;align-items:center;gap:0;flex:1;}
.nav-link{padding:0 12px;height:var(--nav-h);display:flex;align-items:center;font-size:12px;font-weight:500;color:var(--text3);text-decoration:none;transition:color .12s;white-space:nowrap;border-bottom:2px solid transparent;}
.nav-link:hover{color:var(--text2);}
.nav-link.active{color:var(--green);border-bottom-color:var(--green);font-weight:600;}
.nav-actions{display:flex;gap:8px;flex-shrink:0;}
.nav-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--surface);color:var(--text2);}
.nav-btn:hover{border-color:var(--border2);color:var(--text);}
.nav-btn.primary{background:var(--green);color:#fff;border-color:var(--green);}
.nav-btn.primary:hover{background:#0d6b63;}

/* ── Layout ───────────────────────────────────────── */
.layout{display:flex;min-height:calc(100vh - var(--nav-h));}
.sidebar{width:260px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);padding:1rem;overflow-y:auto;}
.main{flex:1;padding:1.25rem;min-width:0;}

/* ── Day switcher ─────────────────────────────────── */
.day-bar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
.day-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;}
.day-btn:hover{border-color:var(--border2);color:var(--text);}
.day-btn.active{background:var(--green);color:#fff;border-color:var(--green);}
.day-sep{width:1px;height:20px;background:var(--border);margin:0 4px;}
.day-date-wrap{display:flex;align-items:center;gap:6px;margin-left:auto;}
.day-date-wrap input[type=date]{font-family:'Inter',sans-serif;font-size:12px;border:1px solid var(--border);border-radius:6px;padding:5px 8px;background:var(--surface);color:var(--text);outline:none;}
.day-date-wrap input[type=time],
.day-date-wrap input[type=number]{font-family:'Inter',sans-serif;font-size:12px;border:1px solid var(--border);border-radius:6px;padding:5px 8px;background:var(--surface);color:var(--text);outline:none;width:80px;}
.day-date-wrap label{font-size:11px;color:var(--text3);}
.btn-analisar{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;background:var(--green);color:#fff;border:none;cursor:pointer;transition:all .15s;}
.btn-analisar:hover{background:#0d6b63;}
.btn-analisar:disabled{opacity:.5;cursor:not-allowed;}

/* ── Stats bar ────────────────────────────────────── */
.stats-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.stat-card-l{font-size:11px;color:var(--text3);font-weight:500;margin-bottom:4px;}
.stat-card-v{font-size:22px;font-weight:700;line-height:1;}
.stat-card-v.green{color:var(--green);}
.stat-card-v.red{color:var(--red);}
.stat-card-v.amber{color:var(--amber);}
.stat-card-v.purple{color:var(--purple);}

/* ── Section header ───────────────────────────────── */
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
.section-title{font-size:13px;font-weight:600;color:var(--text2);}
.section-count{font-size:11px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 8px;}

/* ── Liga group header ────────────────────────────── */
.liga-hd{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:10px 0 6px;margin-top:4px;}
.liga-hd:first-child{margin-top:0;}

/* ── Bet panel (table-grid) ───────────────────────── */
.pn{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1rem;}
.pnh{padding:10px 16px;font-size:11px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2);}
.cols{display:grid;grid-template-columns:16px 20px 1fr minmax(140px,190px) 75px 90px 80px 70px;gap:14px;align-items:center;}
.brow-hd{padding:7px 16px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);}
.brow{padding:11px 16px;border-bottom:1px solid #F1F5F9;cursor:pointer;transition:background .1s;}
.brow:hover{background:#FAFAFA;}
.brow.open{background:#F8FFFE;border-bottom:none;}
.brow.green-res{background:var(--green-lt);}
.brow.red-res{background:var(--red-lt);}
.brow.void-res{background:var(--purple-lt);}
.chevron{font-size:11px;color:#CBD5E1;transition:transform .15s;line-height:1;user-select:none;}
.chevron.open{transform:rotate(90deg);color:var(--green);}
.dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.dot.green{background:var(--green);}
.dot.red{background:var(--red);}
.dot.void{background:var(--purple);}
.match{font-size:14px;font-weight:700;color:#1E293B;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.pick-txt{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.meta-txt{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.odd-val{font-size:14px;font-weight:700;color:var(--amber);white-space:nowrap;}
.conf{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap;}
.conf.alta{background:var(--green-lt);color:var(--green);}
.conf.media{background:var(--amber-lt);color:var(--amber);}
.conf.baixa{background:var(--red-lt);color:var(--red);}
.result-col{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.act-col{display:flex;gap:4px;}
.result-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
.result-badge.green{background:var(--green-lt);color:var(--green);border:1px solid var(--green-bd);}
.result-badge.red{background:var(--red-lt);color:var(--red);border:1px solid var(--red-bd);}
.result-badge.void{background:var(--purple-lt);color:var(--purple);border:1px solid var(--purple-bd);}
.result-badge.pending{background:var(--amber-lt);color:var(--amber);border:1px solid var(--amber-bd);}
.act-btn{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.act-btn:hover{border-color:var(--border2);color:var(--text);}
.act-btn.danger{color:var(--purple);border-color:var(--purple-bd);background:var(--purple-lt);}
.act-btn.danger:hover{background:var(--purple);color:#fff;}
.expand-row{display:none;border-bottom:1px solid #E2E8F0;background:#F8FFFE;}
.expand-row.open{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.exp-alts{padding:12px 16px 14px 60px;border-right:1px solid #E2E8F0;}
.exp-just{padding:12px 16px 14px 16px;}
.mobile-just{display:none;}
.expand-col-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:8px;}

/* Alternatives */
.alt-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;border:1px solid var(--border);background:var(--surface);margin-bottom:4px;}
.alt-item.principal{border-color:var(--green-bd);background:var(--green-lt);}
.alt-merc{font-size:10px;font-weight:600;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 7px;white-space:nowrap;flex-shrink:0;}
.alt-merc.principal-merc{background:var(--green-lt);color:var(--green);border-color:var(--green-bd);}
.alt-aposta{flex:1;font-size:12px;color:var(--text);min-width:0;}
.alt-conf-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;flex-shrink:0;white-space:nowrap;}
.alt-conf-badge.alta{background:var(--green-lt);color:var(--green);}
.alt-conf-badge.media{background:var(--amber-lt);color:var(--amber);}
.alt-conf-badge.baixa{background:var(--red-lt);color:var(--red);}
.alt-res-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0;}
.alt-res-badge.green{background:var(--green-lt);color:var(--green);}
.alt-res-badge.red{background:var(--red-lt);color:var(--red);}

/* Analysis panel */
.analysis-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:13px;color:var(--text2);line-height:1.7;border-left:3px solid var(--green-bd);}
.analysis-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px;}
.backup-box{margin-top:10px;background:var(--amber-lt);border:1px solid var(--amber-bd);border-radius:8px;padding:10px 12px;}
.backup-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--amber);margin-bottom:4px;}
.backup-content{font-size:12px;color:var(--text);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.backup-merc{font-size:10px;font-weight:600;color:var(--amber);background:var(--amber-lt);border:1px solid var(--amber-bd);border-radius:20px;padding:2px 8px;}
.stats-mini-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;}
.sm-mini{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;}
.sm-mini-l{font-size:10px;color:var(--text3);margin-bottom:2px;}
.sm-mini-v{font-size:13px;font-weight:600;color:var(--text);}

/* ── Informar stats button ────────────────────────── */
.btn-stats{font-size:11px;font-weight:600;padding:5px 10px;border-radius:6px;background:var(--amber-lt);color:var(--amber);border:1px solid var(--amber-bd);cursor:pointer;font-family:'Inter',sans-serif;}
.btn-stats:hover{background:var(--amber);color:#fff;}
.btn-informar-analise{font-size:11px;font-weight:600;padding:5px 10px;border-radius:6px;background:var(--green-lt);color:var(--green);border:1px solid var(--green-bd);cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:8px;}
.btn-informar-analise:hover{background:var(--green);color:#fff;}
.btn-corrigir{font-size:10px;padding:2px 5px;border-radius:5px;background:none;border:none;color:var(--text3);cursor:pointer;font-family:'Inter',sans-serif;}
.btn-corrigir:hover{color:var(--text);}

/* ── Sidebar: Múltiplas ───────────────────────────── */
.sidebar-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:12px;}
.mult-day-bar{display:flex;gap:4px;margin-bottom:12px;}
.mult-day-btn{flex:1;padding:5px 4px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;text-align:center;}
.mult-day-btn:hover{border-color:var(--border2);}
.mult-day-btn.active{background:var(--green);color:#fff;border-color:var(--green);}
.mult-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px;}
.mult-card-hd{padding:12px;border-bottom:1px solid var(--border);}
.mult-card-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:4px;}
.mult-card-odd{font-size:26px;font-weight:700;line-height:1;margin-bottom:2px;}
.mult-card-odd.red-odd{color:var(--red);}
.mult-card-odd.amber-odd{color:var(--amber);}
.mult-card-info{font-size:11px;color:var(--text3);}
.mult-card.green-res{border-color:var(--green-bd);}
.mult-card.red-res{border-color:var(--red-bd);}
.mult-jogo{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);gap:6px;}
.mult-jogo:last-child{border-bottom:none;}
.mult-jogo-info{flex:1;min-width:0;}
.mult-jogo-teams{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mult-jogo-meta{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mult-jogo-odd{font-size:12px;font-weight:700;color:var(--amber);flex-shrink:0;}
.mult-total-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;margin-top:4px;}
.mult-total-badge.green{background:var(--green-lt);color:var(--green);border:1px solid var(--green-bd);}
.mult-total-badge.red{background:var(--red-lt);color:var(--red);border:1px solid var(--red-bd);}
.mult-total-badge.pending{background:var(--amber-lt);color:var(--amber);border:1px solid var(--amber-bd);}
.mult-gerar-btn{width:100%;padding:8px;border-radius:7px;background:var(--green-lt);color:var(--green);border:1px solid var(--green-bd);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:6px;}
.mult-gerar-btn:hover{background:var(--green);color:#fff;}

/* ── States ───────────────────────────────────────── */
.empty-state{text-align:center;padding:3rem 2rem;color:var(--text3);}
.empty-state svg{width:32px;height:32px;opacity:.3;display:block;margin:0 auto 10px;}
.empty-state p{font-size:13px;}
.loading-state{text-align:center;padding:3rem 2rem;}
.spin{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 10px;}
.loading-txt{font-size:12px;color:var(--text3);}
.loading-step{font-size:11px;color:var(--green);margin-top:6px;}
.errmsg{text-align:center;padding:2rem;color:var(--red);font-size:12px;}
.aviso{text-align:center;padding:2rem;color:var(--amber);font-size:12px;}
@keyframes sp{to{transform:rotate(360deg);}}

/* ── Modal (Item 7: Adicionar jogo manual) ──────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:900;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.18);}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border);}
.modal-title{font-size:15px;font-weight:700;color:var(--text);}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);line-height:1;padding:2px 6px;border-radius:6px;}
.modal-close:hover{background:var(--surface2);color:var(--text);}
.modal-body{padding:20px;}
.modal-field{margin-bottom:14px;position:relative;}
.modal-label{display:block;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.modal-input{width:100%;font-family:'Inter',sans-serif;font-size:13px;border:1px solid var(--border);border-radius:8px;padding:9px 12px;background:var(--surface2);color:var(--text);outline:none;transition:border-color .12s;}
.modal-input:focus{border-color:var(--green);}
.modal-input:disabled{opacity:.5;cursor:not-allowed;}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.modal-btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'Inter',sans-serif;transition:all .15s;}
.modal-btn:hover{border-color:var(--border2);color:var(--text);}
.modal-btn.primary{background:var(--green);color:#fff;border-color:var(--green);}
.modal-btn.primary:hover{background:#0d6b63;}
.modal-btn:disabled{opacity:.5;cursor:not-allowed;}
/* Dropdown de jogos */
.jogo-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:1000;overflow:hidden;display:none;}
.jogo-dropdown.open{display:block;}
.jogo-drop-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;transition:background .1s;gap:10px;border-bottom:1px solid var(--border);}
.jogo-drop-item:last-child{border-bottom:none;}
.jogo-drop-item:hover{background:var(--surface2);}
.jogo-drop-item.selected{background:var(--green-lt);border-left:3px solid var(--green);}
.jogo-drop-teams{font-size:13px;font-weight:600;color:var(--text);flex:1;min-width:0;}
.jogo-drop-sub{font-size:11px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.jogo-drop-hora{font-size:12px;font-weight:700;color:var(--amber);flex-shrink:0;}
.jogo-drop-empty{padding:14px;text-align:center;font-size:12px;color:var(--text3);}
.jogo-drop-loading{padding:14px;text-align:center;font-size:12px;color:var(--text3);}
/* Jogo selecionado (card) */
.jogo-selecionado{background:var(--green-lt);border:1px solid var(--green-bd);border-radius:10px;padding:12px 14px;display:none;margin-bottom:14px;}
.jogo-selecionado.show{display:flex;align-items:center;gap:12px;}
.jogo-sel-info{flex:1;min-width:0;}
.jogo-sel-teams{font-size:14px;font-weight:700;color:var(--text);}
.jogo-sel-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.jogo-sel-hora{font-size:16px;font-weight:700;color:var(--green);flex-shrink:0;}
.jogo-sel-clear{background:none;border:none;font-size:18px;color:var(--text3);cursor:pointer;padding:2px 4px;border-radius:4px;line-height:1;}
.jogo-sel-clear:hover{color:var(--red);}
/* Resultado da análise IA */
.modal-result{margin-top:0;background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.modal-result-hd{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.modal-result-teams{font-size:14px;font-weight:700;color:var(--text);}
.modal-result-liga{font-size:11px;color:var(--text3);}
.modal-result-body{padding:14px;}
.modal-result-aposta{font-size:15px;font-weight:700;color:var(--green);margin-bottom:4px;}
.modal-result-merc{display:inline-flex;font-size:11px;font-weight:600;background:var(--green-lt);color:var(--green);border:1px solid var(--green-bd);border-radius:20px;padding:2px 8px;margin-left:6px;}
.modal-result-just{font-size:12px;color:var(--text2);line-height:1.6;margin-top:8px;padding:10px 12px;background:var(--surface);border-radius:7px;border-left:3px solid var(--green-bd);}
.modal-result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px;}
.modal-result-alts{margin-top:12px;}
.modal-result-alts-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px;}

/* ── Mobile ───────────────────────────────────────── */
@media(max-width:900px){
  .sidebar{display:none;}
  .nav-links{display:none;}
  .nav-actions .nav-btn span{display:none;}
  .stats-bar{grid-template-columns:repeat(2,1fr);}
  .stats-bar .stat-card:nth-child(5){display:none;}
  .cols{grid-template-columns:16px 20px 1fr 70px 60px;}
  .brow-hd span:nth-child(n+4):not(:nth-child(4)):not(:nth-child(5)){display:none;}

<script>
const BACKEND_URL='https://apostas-app.onrender.com';

function hoje(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function offsetData(base,n){const d=new Date(base+'T12:00:00');d.setDate(d.getDate()+n);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmtD(iso){const[a,m,d]=iso.split('-');return`${d}/${m}`;}
function fmtDL(iso){const[a,m,d]=iso.split('-');return`${d}/${m}/${a}`;}

const hojeStr=hoje();
document.getElementById('d-input').value=offsetData(hojeStr,1);
let dataMin=null,dataMax=offsetData(hojeStr,1);
let dataAtual='';

// Init sidebar mult buttons with data-dtm
(function(){
  const btns=document.querySelectorAll('[data-dtm]');
  const vals=[offsetData(hojeStr,-1),hojeStr,offsetData(hojeStr,1)];
  btns.forEach((b,i)=>b.setAttribute('data-dtm',vals[i]));
})();

async function limitarCalendario(){
  try{
    const r=await fetch(BACKEND_URL+'/datas-disponiveis');
    const j=await r.json();
    const input=document.getElementById('d-input');
    dataMax=offsetData(hojeStr,1);
    if(j.datas?.length>0){dataMin=j.datas[0];input.min=dataMin;}
    input.max=dataMax;
    input.addEventListener('change',()=>{
      const v=input.value;
      if(dataMin&&v<dataMin){input.value=dataMin;mostrarAviso('Data mínima: '+fmtDL(dataMin));return;}
      if(v>dataMax){input.value=dataMax;mostrarAviso('Máximo: amanhã ('+fmtDL(dataMax)+')');return;}
    });
  }catch(e){}
}
limitarCalendario();

function mostrarAviso(msg){
  const tw=document.getElementById('tw');
  tw.innerHTML=`<div class="aviso">⚠ ${msg}</div>`;
  setTimeout(()=>{if(tw.innerHTML.includes(msg))tw.innerHTML='';},3000);
}

// ─── Day buttons ──────────────────────────────────────────────────────────────
function setDayActive(dt){
  document.querySelectorAll('.day-btn[data-dt]').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('data-dt')===dt);
  });
}
// Set data-dt on day buttons
(function(){
  const btns=document.querySelectorAll('.day-btn[data-dt]');
  const vals=[offsetData(hojeStr,-1),hojeStr,offsetData(hojeStr,1)];
  btns.forEach((b,i)=>b.setAttribute('data-dt',vals[i]));
})();

async function carregarDia(data,label){
  setDayActive(data);
  document.getElementById('d-input').value=data;
  document.getElementById('stats-bar').style.display='none';
  document.getElementById('btn-b').disabled=true;
  document.getElementById('tw').innerHTML=`<div class="loading-state"><div class="spin"></div><div class="loading-txt">Buscando apostas de ${label}...</div></div>`;
  try{
    const r=await fetch(`${BACKEND_URL}/apostas-resultado/${data}`);
    const j=await r.json();
    if(j.apostas?.jogos?.length>0){
      const resultados=j.resultados?.apostas||[];
      const jogosComRes=j.apostas.jogos.map(jg=>{
        const res=resultados.find(x=>x.jogo_id===jg.id);
        return{...jg,resultado:res?.resultado_aposta||null,placar:res?.placar||null,mercados_resultado:res?.mercados_resultado||null};
      });
      render(jogosComRes,data);
    }else{
      document.getElementById('tw').innerHTML=`<div class="aviso">⚠ Sem apostas para ${fmtDL(data)}.<br><small>Use "Analisar" para gerar.</small></div>`;
    }
  }catch(e){
    document.getElementById('tw').innerHTML=`<div class="errmsg">Erro ao carregar.</div>`;
  }finally{document.getElementById('btn-b').disabled=false;}
}

const steps=['Buscando jogos na API...','Filtrando ligas prioritárias...','Coletando estatísticas...','IA analisando jogos...','Definindo apostas...','Salvando no banco...'];

async function buscar(){
  const dv=document.getElementById('d-input').value;
  const hora=document.getElementById('h-min').value;
  const meta=parseInt(document.getElementById('q-jogos').value)||15;
  if(!dv) return;
  if(dataMin&&dv<dataMin){mostrarAviso('Data mínima: '+fmtDL(dataMin));return;}
  if(dv>dataMax){mostrarAviso('Máximo: amanhã ('+fmtDL(dataMax)+')');return;}
  document.getElementById('btn-b').disabled=true;
  document.getElementById('stats-bar').style.display='none';
  document.getElementById('tw').innerHTML=`<div class="loading-state"><div class="spin"></div><div class="loading-txt">Buscando apostas de ${fmtDL(dv)}...</div></div>`;
  try{
    const r=await fetch(`${BACKEND_URL}/apostas-resultado/${dv}`);
    const j=await r.json();
    if(j.apostas?.jogos?.length>0){
      const resultados=j.resultados?.apostas||[];
      const jogosComRes=j.apostas.jogos.map(jg=>{
        const res=resultados.find(x=>x.jogo_id===jg.id);
        return{...jg,resultado:res?.resultado_aposta||null,placar:res?.placar||null,mercados_resultado:res?.mercados_resultado||null};
      });
      render(jogosComRes,dv);
      document.getElementById('btn-b').disabled=false;
      return;
    }
  }catch(e){}
  let si=0;
  document.getElementById('tw').innerHTML=`<div class="loading-state"><div class="spin"></div><div class="loading-txt">Analisando ${fmtDL(dv)}...</div><div class="loading-step" id="step">${steps[0]}</div></div>`;
  const iv=setInterval(()=>{si=(si+1)%steps.length;const e=document.getElementById('step');if(e)e.textContent=steps[si];},3000);
  try{
    const r=await fetch(`${BACKEND_URL}/analisar`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:dv,hora,meta})});
    if(!r.ok){const e=await r.json();throw new Error(e.error||`Erro ${r.status}`);}
    const p=await r.json();
    clearInterval(iv);
    if(p.aviso){document.getElementById('tw').innerHTML=`<div class="aviso">⚠ ${p.aviso}</div>`;return;}
    try{
      const rv=await fetch(`${BACKEND_URL}/apostas-resultado/${dv}`);
      const jv=await rv.json();
      if(jv.resultados?.apostas?.length){
        const resultados=jv.resultados.apostas;
        const jogosComRes=(p.jogos||[]).map(jg=>{
          const res=resultados.find(x=>x.jogo_id===jg.id);
          return{...jg,resultado:res?.resultado_aposta||null,placar:res?.placar||null,mercados_resultado:res?.mercados_resultado||null};
        });
        render(jogosComRes,dv);
        return;
      }
    }catch(e){}
    render(p.jogos||[],dv);
  }catch(e){
    clearInterval(iv);
    document.getElementById('tw').innerHTML=`<div class="errmsg">❌ ${e.message}</div>`;
  }finally{document.getElementById('btn-b').disabled=false;}
}

// ─── Múltiplas (sidebar) ──────────────────────────────────────────────────────
let dataMultAtual=null;

function setMultDayActive(dt){
  document.querySelectorAll('[data-dtm]').forEach(b=>b.classList.toggle('active',b.getAttribute('data-dtm')===dt));
}

async function carregarMultiplas(data,label){
  dataMultAtual=data;
  setMultDayActive(data);
  document.getElementById('mult-content').innerHTML=`<div class="loading-state" style="padding:2rem 0"><div class="spin"></div><div class="loading-txt">Carregando...</div></div>`;
  try{
    const r=await fetch(`${BACKEND_URL}/multiplas/${data}`);
    const j=await r.json();
    if(!j.multiplas){
      try{
        const ra=await fetch(`${BACKEND_URL}/apostas-resultado/${data}`);
        const ja=await ra.json();
        if(!ja.apostas?.jogos?.length){
          document.getElementById('mult-content').innerHTML=`<div class="empty-state" style="padding:1.5rem 0"><p>Sem apostas para ${fmtDL(data)}</p></div>`;
          return;
        }
      }catch(e){}
      document.getElementById('mult-content').innerHTML=`
        <div class="empty-state" style="padding:1.5rem 0"><p>Múltiplas não geradas</p></div>
        <button class="mult-gerar-btn" onclick="gerarMultiplasManual('${data}')">🎯 Gerar múltiplas</button>`;
      return;
    }
    const mA=j.multiplas?.multipla_a,mB=j.multiplas?.multipla_b;
    const validas=mA?.odd_total>0&&mB?.odd_total>0&&mA?.jogos?.length>0;
    if(!validas){
      document.getElementById('mult-content').innerHTML=`
        <div class="empty-state" style="padding:1.5rem 0"><p>Odds inválidas</p></div>
        <button class="mult-gerar-btn" onclick="gerarMultiplasManual('${data}')">🔄 Regerar</button>`;
      return;
    }
    renderMultiplas(j.multiplas,j.resultados_multiplas);
  }catch(e){
    document.getElementById('mult-content').innerHTML=`<div class="empty-state" style="padding:1.5rem 0"><p>Erro ao carregar</p></div>`;
  }
}

async function gerarMultiplasManual(data){
  document.getElementById('mult-content').innerHTML=`<div class="loading-state" style="padding:2rem 0"><div class="spin"></div><div class="loading-txt">Gerando...</div></div>`;
  try{
    await fetch(`${BACKEND_URL}/gerar-multiplas/${data}`,{method:'POST'});
    await new Promise(r=>setTimeout(r,35000));
    const r=await fetch(`${BACKEND_URL}/multiplas/${data}`);
    const j=await r.json();
    if(j.multiplas) renderMultiplas(j.multiplas,j.resultados_multiplas);
    else document.getElementById('mult-content').innerHTML=`<div class="empty-state" style="padding:1.5rem 0"><p>Não foi possível gerar.</p></div>`;
  }catch(e){
    document.getElementById('mult-content').innerHTML=`<div class="errmsg">❌ ${e.message}</div>`;
  }
}

function renderMultiplas(multiplas,resultados){
  const rA=resultados?.multipla_a,rB=resultados?.multipla_b;
  const nomes={gols:'Gols',escanteios:'Esc.',cartoes:'Cart.',resultado:'Res.'};
  const renderJogo=(jogo,resJogos)=>{
    const rj=resJogos?.find(r=>r.time_casa===jogo.time_casa&&r.time_fora===jogo.time_fora);
    const res=rj?.resultado||null;
    const badge=res==='green'?'<span class="result-badge green">✓</span>':res==='red'?'<span class="result-badge red">✗</span>':res==='cancelado'?'<span class="result-badge" style="background:var(--purple-lt);color:var(--purple);border:1px solid var(--purple-bd)">↩</span>':'';
    return`<div class="mult-jogo">
      <div class="mult-jogo-info">
        <div class="mult-jogo-teams">${jogo.time_casa} x ${jogo.time_fora}</div>
        <div class="mult-jogo-meta">${jogo.liga||''} · ${jogo.horario||''} · ${jogo.aposta}</div>
      </div>
      <div style="display:flex;align-items:center;gap:5px;flex-shrink:0">
        <span class="mult-jogo-odd">${jogo.odd}</span>
        ${badge}
      </div>
    </div>`;
  };
  const renderCard=(mult,res,label,oddClass)=>{
    if(!mult) return'';
    const resultado=res?.resultado;
    const cardCls=resultado==='green'?'green-res':resultado==='red'?'red-res':'';
    const badge=resultado==='green'?'<span class="mult-total-badge green">✓ GREEN</span>':resultado==='red'?'<span class="mult-total-badge red">✗ RED</span>':resultado==='cancelado'?'<span class="mult-total-badge" style="background:var(--purple-lt);color:var(--purple);border:1px solid var(--purple-bd)">↩ REEMBOLSO</span>':'<span class="mult-total-badge pending">⏳</span>';
    return`<div class="mult-card ${cardCls}">
      <div class="mult-card-hd">
        <div class="mult-card-label">${label}</div>
        <div class="mult-card-odd ${oddClass}">@${mult.odd_total}</div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div class="mult-card-info">${mult.jogos?.length||0} jogos</div>
          ${badge}
        </div>
      </div>
      ${(mult.jogos||[]).map(j=>renderJogo(j,res?.jogos_resultado)).join('')}
    </div>`;
  };
  document.getElementById('mult-content').innerHTML=
    renderCard(multiplas.multipla_a,rA,'Múltipla A — Maior odd','red-odd')+
    renderCard(multiplas.multipla_b,rB,'Múltipla B — Mais segura','amber-odd');
}

// ─── Render apostas ────────────────────────────────────────────────────────────
const gN={a:'🇧🇷 Série A',b:'🇧🇷 Série B',copa:'🏆 Copas',it:'🇮🇹 Serie A Italiana',es:'🇪🇸 La Liga',eu:'🌍 Europeias',sul:'🌎 Sul-Americanas',af:'🌍 África & Oriente Médio',other:'🌐 Outras'};
const mercNome={gols:'Gols',escanteios:'Escanteios',cartoes:'Cartões',resultado:'Resultado'};
let expSet=new Set();

function render(jogos,data){
  if(data) dataAtual=data;
  if(!jogos.length){document.getElementById('tw').innerHTML='<div class="empty-state"><p>Nenhum jogo encontrado.</p></div>';return;}
  jogos.forEach(j=>{if(j.confianca==='nao_recomendado') j.confianca='baixa';});

  const vGreen=jogos.filter(j=>j.resultado==='green').length;
  const vRed=jogos.filter(j=>j.resultado==='red').length;
  const vAnulados=jogos.filter(j=>j.resultado==='cancelado').length;
  const total=vGreen+vRed;
  const assert=total>0?Math.round(vGreen/total*100)+'%':'-';

  document.getElementById('s-jogos').textContent=jogos.length;
  document.getElementById('s-green').textContent=vGreen;
  document.getElementById('s-red').textContent=vRed;
  document.getElementById('s-anulados').textContent=vAnulados;
  document.getElementById('s-assert').textContent=assert;
  document.getElementById('stats-bar').style.display='grid';

  const grupos={};
  jogos.forEach(j=>{
    const g=['a','b','copa','it','es','eu','sul','af','other'].includes(j.tipo_liga)?j.tipo_liga:'eu';
    if(!grupos[g]) grupos[g]=[];grupos[g].push(j);
  });
  const ordem=['a','b','copa','it','es','eu','sul','af','other'];

  let rows='',i=0;
  ordem.forEach(g=>{

// ─── Calcular resultado alternativa ────────────────────────────────────────────
function calcularResultadoAlt(alt,placar,mercadosResult,timeCasa,timeFora){
  if(!alt?.aposta) return null;
  const merc=alt.mercado||'gols';
  if(merc==='escanteios'||merc==='cartoes'){
    if(!mercadosResult?.[merc]) return null;
    const apNorm=(alt.aposta||'').trim().toLowerCase();
    for(const[chave,res]of Object.entries(mercadosResult[merc])){
      if(apNorm.includes(chave.toLowerCase())||chave.toLowerCase().includes(apNorm)) return res;
    }
    return null;
  }
  if(!placar) return null;
  const m=placar.match(/(\d+)-(\d+)/);
  if(!m) return null;
  const gc=parseInt(m[1]),gf=parseInt(m[2]),total=gc+gf;
  const ap=(alt.aposta||'').toLowerCase();
  if(merc==='gols'){
    const n=parseFloat(ap.match(/[\d.]+/)?.[0]);
    if(ap.includes('over')||ap.includes('mais')) return total>n?'green':'red';
    if(ap.includes('under')||ap.includes('menos')) return total<n?'green':'red';
    if(ap.includes('ambas')||ap.includes('btts')) return(gc>0&&gf>0)?'green':'red';
  }
  if(merc==='resultado'){
    const casaVence=gc>gf,foraVence=gf>gc,empate=gc===gf;
    const normAcc=s=>(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'');
    const apN=normAcc(ap);
    if((apN.includes('empate')||apN==='x')&&!apN.includes('dupla')&&!apN.includes('ou empat')&&!apN.includes('1x')&&!apN.includes('x2')) return empate?'green':'red';
    if(apN.includes('x2')||apN.includes('dupla fora')) return(foraVence||empate)?'green':'red';
    if(apN.includes('1x')||apN.includes('dupla casa')) return(casaVence||empate)?'green':'red';
    if(apN.includes('dupla')&&apN.includes('ou empat')){
      if(apN.includes('casa')||apN.includes('home')) return(casaVence||empate)?'green':'red';
      if(apN.includes('fora')||apN.includes('away')) return(foraVence||empate)?'green':'red';
    }
    const nomeCasa=normAcc((timeCasa||'').toLowerCase()),nomeFora=normAcc((timeFora||'').toLowerCase());
    const primCasa=nomeCasa.split(' ')[0],primFora=nomeFora.split(' ')[0];
    if(apN.includes('ou empat')||apN.includes('nao perde')){
      if(primCasa&&apN.includes(primCasa)) return(casaVence||empate)?'green':'red';
      if(primFora&&apN.includes(primFora)) return(foraVence||empate)?'green':'red';
    }
    if(apN.includes('vence')||apN.includes('vitoria')){
      if(primCasa&&apN.includes(primCasa)) return casaVence?'green':'red';
      if(primFora&&apN.includes(primFora)) return foraVence?'green':'red';
      if(apN.includes('casa')||apN.includes('home')) return casaVence?'green':'red';
      if(apN.includes('fora')||apN.includes('away')) return foraVence?'green':'red';
    }
  }
  return null;
}

async function buscarJogosTime(q, _retry){
  const data = document.getElementById('m-data').value;
  if(!data){ fecharDropdown(); return; }
  const dd = document.getElementById('m-dropdown');
  let countdown;
  try{
    const timesExistentes = [];
    document.querySelectorAll('.match').forEach(el => {
      const txt = el.textContent || '';
      const partes = txt.split(' x ');
      if(partes[0]) timesExistentes.push(partes[0].trim());
      if(partes[1]) timesExistentes.push(partes[1].trim());
    });
    const teParam = timesExistentes.length ? '&times_existentes=' + encodeURIComponent(timesExistentes.join('|')) : '';
    const r = await fetch(`${BACKEND_URL}/buscar-jogos-time?time=${encodeURIComponent(q)}&data=${data}${teParam}`);
    let j;
    try { j = await r.json(); }
    catch(parseErr) {
      // Resposta não é JSON — mostrar o texto real para diagnóstico
      let rawText = '';
      try { rawText = await r.text(); } catch(_){}
      const preview = rawText.replace(/<[^>]+>/g,'').trim().substring(0, 120);
      dd.innerHTML = `<div class="jogo-drop-empty">Resposta inesperada do servidor (HTTP ${r.status}): ${preview || parseErr.message}</div>`;
      return;
    }
    if(countdown) clearTimeout(countdown);
    if(!r.ok){
      dd.innerHTML = `<div class="jogo-drop-empty">Erro do servidor: ${j.error || r.status}</div>`;
      return;
    }
    const jogos = j.jogos || [];
    if(!jogos.length){
      const msg = j.aviso || 'Nenhum jogo encontrado para este time nesta data';
      dd.innerHTML = `<div class="jogo-drop-empty">${msg}</div>`;
      return;
    }
    dd.innerHTML = jogos.map((jg, i) =>
      `<div class="jogo-drop-item" onclick="selecionarJogo(${i})" data-idx="${i}">
        <div style="flex:1;min-width:0">
          <div class="jogo-drop-teams">${jg.time_casa} <span style="color:var(--text3);font-weight:400">x</span> ${jg.time_fora}</div>
          <div class="jogo-drop-sub">${jg.liga||''} · ${jg.pais||''}</div>
        </div>
        <div class="jogo-drop-hora">${jg.horario}</div>
      </div>`
    ).join('');
    dd._jogos = jogos;
  }catch(e){
    if(countdown) clearTimeout(countdown);
    dd.innerHTML = `<div class="jogo-drop-empty">Erro de rede: ${e.message}</div>`;
  }
}

function selecionarJogo(idx){

document.addEventListener('click', e => {
  const dd = document.getElementById('m-dropdown');
  const campo = document.getElementById('m-busca');
  if(dd && campo && !dd.contains(e.target) && e.target !== campo) fecharDropdown();
});

async function analisarJogoManual(){
  if(!jogoSelecionado){ return; }
  const data = document.getElementById('m-data').value;
  if(!data){ return; }

  const btn = document.getElementById('m-btn-analisar');
  btn.disabled = true;
  const resDiv = document.getElementById('m-result');
  resDiv.innerHTML = `<div class="loading-state" style="padding:24px 0"><div class="spin"></div><div class="loading-txt">IA analisando ${jogoSelecionado.time_casa} x ${jogoSelecionado.time_fora}...</div><div class="loading-step">Buscando estatísticas e escalações com web search...</div></div>`;

  try{
    const r = await fetch(`${BACKEND_URL}/adicionar-jogo-manual`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        time_casa: jogoSelecionado.time_casa,
        time_fora: jogoSelecionado.time_fora,
        data,
        liga_id: jogoSelecionado.liga_id
      })
    });
    const j = await r.json();
    if(!j.ok || !j.jogo) throw new Error(j.error || 'Resposta inválida da IA');
    jogoAnalisado = j.jogo;
    renderResultadoModal(j.jogo, data);
  }catch(e){
    resDiv.innerHTML = `<div class="errmsg" style="margin-top:12px">❌ ${e.message}</div>`;
    btn.disabled = false;
  }
}

function renderResultadoModal(jogo, data){
  document.getElementById('m-btn-analisar').disabled = false;
  const confNorm = jogo.confianca || 'media';
  const mercNomes = {gols:'Gols',escanteios:'Escanteios',cartoes:'Cartões',resultado:'Resultado'};
  const altRows = (jogo.alternativas || []).map(a => {
    const isPri = a.mercado === jogo.mercado && a.aposta === jogo.aposta;
    return `<div class="alt-item${isPri?' principal':''}" style="margin-bottom:4px">
      <span class="alt-merc${isPri?' principal-merc':''}">${mercNomes[a.mercado]||a.mercado}${isPri?' ★':''}</span>
      <span class="alt-aposta">${a.aposta||'-'}</span>
      <span class="alt-conf-badge ${a.confianca||'baixa'}">${a.confianca||'-'}</span>
    </div>`;
  }).join('');

  document.getElementById('m-result').innerHTML = `
    <div class="modal-result" style="margin-top:16px">
      <div class="modal-result-hd">
        <div>
          <div class="modal-result-teams">${jogo.time_casa} x ${jogo.time_fora}</div>
          <div class="modal-result-liga">${jogo.liga||''} · ${jogo.horario||''}</div>
        </div>
        <span class="conf ${confNorm}" style="margin-left:auto">${confNorm.charAt(0).toUpperCase()+confNorm.slice(1)}</span>
      </div>
      <div class="modal-result-body">
        <div>
          <span class="modal-result-aposta">${jogo.aposta}</span>
          <span class="modal-result-merc">${mercNomes[jogo.mercado]||jogo.mercado}</span>
          <span style="font-size:14px;font-weight:700;color:var(--amber);margin-left:8px">@${jogo.odd_sugerida||'-'}</span>
        </div>
        <div class="modal-result-just">${jogo.justificativa||'-'}</div>
        <div class="modal-result-stats">
          <div class="sm-mini"><div class="sm-mini-l">Gols casa</div><div class="sm-mini-v">${jogo.media_gols_casa||'-'}</div></div>
          <div class="sm-mini"><div class="sm-mini-l">Gols fora</div><div class="sm-mini-v">${jogo.media_gols_fora||'-'}</div></div>
          <div class="sm-mini"><div class="sm-mini-l">Escanteios</div><div class="sm-mini-v">${jogo.media_escanteios||'-'}</div></div>
          <div class="sm-mini"><div class="sm-mini-l">Cartões</div><div class="sm-mini-v">${jogo.media_cartoes||'-'}</div></div>
          <div class="sm-mini"><div class="sm-mini-l">Forma casa</div><div class="sm-mini-v" style="font-size:11px">${jogo.forma_casa||'-'}</div></div>
          <div class="sm-mini"><div class="sm-mini-l">Forma fora</div><div class="sm-mini-v" style="font-size:11px">${jogo.forma_fora||'-'}</div></div>
        </div>
        ${altRows?`<div class="modal-result-alts"><div class="modal-result-alts-title">Alternativas</div>${altRows}</div>`:''}
        <div class="modal-actions" style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
          <button class="modal-btn" onclick="fecharModal()">Cancelar</button>
          <button class="modal-btn" style="color:var(--text3)" onclick="analisarJogoManual()">↺ Nova análise</button>
          <button class="modal-btn primary" onclick="confirmarJogoManual('${data}')">✓ Confirmar e adicionar</button>
        </div>
      </div>
    </div>`;
}

async function confirmarJogoManual(data){
  if(!jogoAnalisado){ return; }
  try{
    const r = await fetch(`${BACKEND_URL}/confirmar-jogo-manual`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ data, jogo: jogoAnalisado })
    });
    const j = await r.json();
    if(!j.ok) throw new Error(j.error || 'Erro desconhecido');
    fecharModal();
    const rv = await fetch(`${BACKEND_URL}/apostas-resultado/${data}`);
    const dv = await rv.json();
    if(dv.apostas?.jogos?.length > 0){
      const resultados = dv.resultados?.apostas || [];
      const jogosComRes = dv.apostas.jogos.map(jg => {
        const res = resultados.find(x => x.jogo_id === jg.id);
        return {...jg, resultado:res?.resultado_aposta||null, placar:res?.placar||null, mercados_resultado:res?.mercados_resultado||null};
      });
      render(jogosComRes, data);
    }
  }catch(e){ alert('Erro ao confirmar: ' + e.message); }
}
</script>

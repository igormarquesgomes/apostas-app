<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análise de Apostas · Estrela Bet</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --surface: #161820;
    --surface2: #1e2028;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaf0;
    --text2: #8b8fa8;
    --text3: #454760;
    --accent: #6ee7b7;
    --accent2: #34d399;
    --purple: #a78bfa;
    --amber: #fbbf24;
    --red: #f87171;
    --blue: #60a5fa;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
  .app { max-width: 1120px; margin: 0 auto; padding: 1.5rem 1.5rem 4rem; }

  /* ── NAVBAR ── */
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.5rem; height: 52px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100; margin: 0 -1.5rem 1.5rem;
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .nav-logo-icon svg { width: 14px; height: 14px; color: #0d0f12; }
  .nav-logo-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .nav-logo-name span { color: var(--accent); }
  .nav-links { display: flex; gap: 4px; }
  .nav-link { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; padding: 6px 14px; border-radius: 6px; border: 1px solid transparent; color: var(--text2); cursor: pointer; text-decoration: none; transition: all .15s; }
  .nav-link:hover { color: var(--text); background: var(--surface2); }
  .nav-link.active { color: var(--accent); border-color: rgba(110,231,183,0.2); background: rgba(110,231,183,0.06); }
  .nav-badge { font-size: 11px; font-family: var(--mono); background: rgba(110,231,183,0.08); color: var(--accent); border: 1px solid rgba(110,231,183,0.18); padding: 5px 12px; border-radius: 20px; }

  /* Navegação de dias */
  .nav-dias { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .nav-btn { font-family: var(--mono); font-size: 12px; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.active { border-color: var(--accent); background: rgba(110,231,183,0.08); color: var(--accent); }
  .nav-btn .nav-label { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; }
  .nav-btn .nav-date { font-size: 13px; font-weight: 500; color: inherit; }
  .nav-btn.active .nav-date { color: var(--accent); }

  /* Controles */
  .controls { display: grid; grid-template-columns: 200px 140px 90px 1fr; gap: 12px; align-items: end; margin-bottom: 1.5rem; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 11px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
  input[type="date"], input[type="time"], input[type="number"] { background: var(--surface); border: 1px solid var(--border2); color: var(--text); font-family: var(--mono); font-size: 13px; padding: 10px 12px; border-radius: 8px; width: 100%; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: var(--accent); }
  input[type="date"]::-webkit-calendar-picker-indicator, input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.7); }
  .btn { background: var(--accent); color: #0d0f12; font-family: var(--sans); font-size: 14px; font-weight: 600; padding: 11px 22px; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; justify-content: center; }
  .btn:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .stat .sl { font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .stat .sv { font-size: 24px; font-weight: 600; }

  /* Tabela */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
  thead th { padding: 10px 12px; text-align: left; font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; background: var(--surface2); border-bottom: 1px solid var(--border); font-weight: 400; }
  th:nth-child(1){width:22%} th:nth-child(2){width:10%} th:nth-child(3){width:7%} th:nth-child(4){width:22%} th:nth-child(5){width:12%} th:nth-child(6){width:12%} th:nth-child(7){width:9%} th:nth-child(8){width:6%}
  tbody tr.dr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; }
  tbody tr.dr:hover, tbody tr.dr.open { background: var(--surface2); }
  td { padding: 10px 12px; vertical-align: middle; }
  .jn { font-weight: 500; font-size: 13px; }
  .jh { font-size: 10px; font-family: var(--mono); color: var(--text3); margin-top: 2px; }
  .pill { font-size: 10px; font-family: var(--mono); padding: 2px 8px; border-radius: 20px; display: inline-block; white-space: nowrap; font-weight: 500; }
  .p-a  { background: rgba(52,211,153,0.12); color: #6ee7b7; border: 1px solid rgba(52,211,153,0.2); }
  .p-b  { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
  .p-eu { background: rgba(167,139,250,0.12); color: #a78bfa; border: 1px solid rgba(167,139,250,0.2); }
  .p-it { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.2); }
  .p-es { background: rgba(96,165,250,0.12); color: #60a5fa; border: 1px solid rgba(96,165,250,0.2); }
  .p-copa { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
  .p-gols { background: rgba(96,165,250,0.12); color: #93c5fd; border: 1px solid rgba(96,165,250,0.2); }
  .p-esc  { background: rgba(52,211,153,0.12); color: #6ee7b7; border: 1px solid rgba(52,211,153,0.2); }
  .p-car  { background: rgba(248,113,113,0.12); color: #fca5a5; border: 1px solid rgba(248,113,113,0.2); }
  .p-res  { background: rgba(251,191,36,0.12); color: #fcd34d; border: 1px solid rgba(251,191,36,0.2); }
  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: middle; }
  .d-a { background: #34d399; } .d-m { background: #fbbf24; } .d-b { background: #f87171; }
  .c-a { color: #6ee7b7; } .c-m { color: #fbbf24; } .c-b { color: #f87171; }
  .odd-v { font-family: var(--mono); font-weight: 500; }
  .chev { color: var(--text3); font-size: 13px; transition: transform 0.2s; display: inline-block; }
  .chev.open { transform: rotate(180deg); }
  .sh-row td { padding: 7px 12px; font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); border-top: 1px solid var(--border); }
  .er td { padding: 0; }
  .ei { padding: 16px; border-bottom: 1px solid var(--border); background: #12141a; }
  .eg { display: grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap: 8px; margin-bottom: 14px; }
  .ms { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px; }
  .ml2 { font-size: 9px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .mv2 { font-size: 13px; font-weight: 500; font-family: var(--mono); }
  .jlabel { font-size: 9px; font-family: var(--mono); color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .jtxt { font-size: 13px; color: var(--text2); line-height: 1.7; padding: 11px 14px; background: var(--surface); border-left: 2px solid var(--accent2); }
  .empty { text-align: center; padding: 5rem 2rem; color: var(--text3); }
  .empty svg { width: 40px; height: 40px; margin-bottom: 14px; display: block; margin-left: auto; margin-right: auto; opacity: 0.3; }
  .loading { text-align: center; padding: 5rem 2rem; color: var(--text2); }
  .spin { width: 30px; height: 30px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: sp 0.8s linear infinite; margin: 0 auto 12px; }
  .loading p { font-size: 13px; font-family: var(--mono); color: var(--text3); }
  .loading .step { font-size: 12px; color: var(--accent); margin-top: 6px; font-family: var(--mono); }
  .errmsg { text-align: center; padding: 3rem 2rem; color: var(--red); font-family: var(--mono); font-size: 13px; }
  .aviso-banco { text-align: center; padding: 3rem 2rem; color: var(--amber); font-family: var(--mono); font-size: 13px; }
  @keyframes sp { to { transform: rotate(360deg); } }
  @media (max-width: 700px) {
    .controls { grid-template-columns: 1fr 1fr; }
    .stats { grid-template-columns: 1fr 1fr; }
    .eg { grid-template-columns: repeat(3, 1fr); }
    nav { padding: 0 1rem; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- NAVBAR -->
  <nav>
    <a class="nav-logo" href="index.html">
      <div class="nav-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <span class="nav-logo-name">Análise de <span>Apostas</span></span>
    </a>
    <div class="nav-links">
      <a class="nav-link active" href="index.html">Apostas</a>
      <a class="nav-link" href="dashboard.html">Dashboard</a>
    </div>
    <span class="nav-badge">Estrela Bet</span>
  </nav>

  <!-- Navegação de dias -->
  <div class="nav-dias" id="nav-dias"></div>

  <!-- Controles -->
  <div class="controls">
    <div class="field">
      <label>Data dos jogos</label>
      <input type="date" id="d-input">
    </div>
    <div class="field">
      <label>Horário mínimo</label>
      <input type="time" id="h-min" value="13:00">
    </div>
    <div class="field">
      <label>Meta</label>
      <input type="number" id="q-jogos" value="15" min="5" max="20">
    </div>
    <button class="btn" id="btn-b" onclick="buscar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Buscar e analisar
    </button>
  </div>

  <div class="stats" id="sa" style="display:none">
    <div class="stat"><div class="sl">Jogos</div><div class="sv" style="color:var(--accent)" id="sj">0</div></div>
    <div class="stat"><div class="sl">Alta confiança</div><div class="sv" style="color:var(--amber)" id="sa2">0</div></div>
    <div class="stat"><div class="sl">Odd média</div><div class="sv" style="color:var(--blue)" id="so">-</div></div>
    <div class="stat"><div class="sv" style="color:var(--purple)" id="sm">-</div><div class="sl">Mercados</div></div>
  </div>

  <div class="table-wrap" id="tw">
    <div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <p>Selecione a data ou use os atalhos acima</p>
    </div>
  </div>

  <p style="text-align:center;font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:1rem">
    Backend: <span style="color:var(--accent)" id="backend-url">carregando...</span>
  </p>
</div>

<script>
const BACKEND_URL = window.BACKEND_URL || 'https://apostas-app.onrender.com';
document.getElementById('backend-url').textContent = BACKEND_URL;

function hoje() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function offsetData(base, n) {
  const d = new Date(base + 'T12:00:00');
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtData(iso) { const [a,m,d] = iso.split('-'); return `${d}/${m}`; }
function fmtDataLong(iso) { const [a,m,d] = iso.split('-'); return `${d}/${m}/${a}`; }

const hojeStr = hoje();
document.getElementById('d-input').value = offsetData(hojeStr, 1);

function renderNav() {
  const nav = document.getElementById('nav-dias');
  const dias = [{ label:'Ontem', offset:-1 }, { label:'Hoje', offset:0 }, { label:'Amanhã', offset:1 }];
  nav.innerHTML = dias.map(d => {
    const data = offsetData(hojeStr, d.offset);
    return `<button class="nav-btn" data-data="${data}" onclick="carregarDia('${data}', '${d.label}')">
      <span class="nav-label">${d.label}</span>
      <span class="nav-date">${fmtData(data)}</span>
    </button>`;
  }).join('');
}
renderNav();

async function carregarDia(data, label) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-data="${data}"]`)?.classList.add('active');
  document.getElementById('d-input').value = data;
  document.getElementById('sa').style.display = 'none';
  document.getElementById('tw').innerHTML = `<div class="loading"><div class="spin"></div><p>Buscando apostas de ${label} (${fmtDataLong(data)})...</p><div class="step">Verificando banco de dados...</div></div>`;
  document.getElementById('btn-b').disabled = true;
  try {
    const periodo = label === 'Ontem' ? 'ontem' : label === 'Hoje' ? 'hoje' : 'amanha';
    const res = await fetch(`${BACKEND_URL}/apostas/${periodo}`);
    const json = await res.json();
    if (json.jogos && json.jogos.length > 0) render(json.jogos);
    else if (json.aviso) document.getElementById('tw').innerHTML = `<div class="aviso-banco">⚠ ${json.aviso}<br><br><small>Use "Buscar e analisar" para gerar as apostas deste dia.</small></div>`;
    else document.getElementById('tw').innerHTML = `<div class="aviso-banco">Nenhuma aposta encontrada para ${fmtDataLong(data)}.</div>`;
  } catch(err) {
    document.getElementById('tw').innerHTML = `<div class="errmsg">Erro: ${err.message}</div>`;
  } finally {
    document.getElementById('btn-b').disabled = false;
  }
}

const steps = ['Buscando jogos na API Football...','Filtrando por ligas prioritárias...','Coletando estatísticas...','IA analisando com dados reais...','Definindo apostas...','Salvando no banco...'];

async function buscar() {
  const dv = document.getElementById('d-input').value;
  const hora = document.getElementById('h-min').value;
  const meta = parseInt(document.getElementById('q-jogos').value) || 15;
  if (!dv) return;
  document.getElementById('btn-b').disabled = true;
  document.getElementById('sa').style.display = 'none';
  let stepIdx = 0;
  document.getElementById('tw').innerHTML = `<div class="loading"><div class="spin"></div><p>Analisando ${fmtDataLong(dv)}...</p><div class="step" id="step-txt">${steps[0]}</div></div>`;
  const interval = setInterval(() => { stepIdx=(stepIdx+1)%steps.length; const el=document.getElementById('step-txt'); if(el) el.textContent=steps[stepIdx]; }, 3000);
  try {
    const res = await fetch(`${BACKEND_URL}/analisar`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({data:dv,hora,meta}) });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error || `Erro ${res.status}`); }
    const parsed = await res.json();
    clearInterval(interval);
    if (parsed.aviso) document.getElementById('tw').innerHTML = `<div class="aviso-banco">⚠ ${parsed.aviso}</div>`;
    else render(parsed.jogos || []);
  } catch(err) {
    clearInterval(interval);
    document.getElementById('tw').innerHTML = `<div class="errmsg">❌ ${err.message}</div>`;
  } finally {
    document.getElementById('btn-b').disabled = false;
  }
}

let exp = new Set();
const ml = { gols:'Gols', escanteios:'Escanteios', cartoes:'Cartões', resultado:'Resultado' };
const lc = { a:'p-a', b:'p-b', eu:'p-eu', it:'p-it', es:'p-es', copa:'p-copa' };
const ln = { a:'Série A', b:'Série B', eu:'Europa', it:'Serie A 🇮🇹', es:'La Liga 🇪🇸', copa:'Copa' };
const mc = { gols:'p-gols', escanteios:'p-esc', cartoes:'p-car', resultado:'p-res' };
const gNomes = { a:'🇧🇷 Série A', b:'🇧🇷 Série B', it:'🇮🇹 Serie A Italiana', es:'🇪🇸 La Liga', eu:'🌍 Ligas Europeias', copa:'🏆 Copas' };

function render(jogos) {
  if (!jogos.length) { document.getElementById('tw').innerHTML='<div class="empty"><p>Nenhum jogo encontrado.</p></div>'; return; }
  const alta = jogos.filter(j=>j.confianca==='alta').length;
  const odds = jogos.map(j=>parseFloat(j.odd_sugerida)).filter(Boolean);
  const om = odds.length?(odds.reduce((a,b)=>a+b,0)/odds.length).toFixed(2):'-';
  const mercs = new Set(jogos.map(j=>j.mercado)).size;
  document.getElementById('sj').textContent=jogos.length;
  document.getElementById('sa2').textContent=alta;
  document.getElementById('so').textContent=om;
  document.getElementById('sm').textContent=mercs;
  document.getElementById('sa').style.display='grid';
  const grupos={};
  jogos.forEach(j=>{ const g=j.tipo_liga||'eu'; if(!grupos[g]) grupos[g]=[]; grupos[g].push(j); });
  const ordem=['a','b','it','es','eu','copa'];
  let html='', i=0;
  ordem.forEach(g=>{
    if(!grupos[g]||!grupos[g].length) return;
    html+=`<tr class="sh-row"><td colspan="8">${gNomes[g]||g}</td></tr>`;
    grupos[g].forEach(j=>{
      const dc=j.confianca==='alta'?'d-a':j.confianca==='media'?'d-m':'d-b';
      const cc=j.confianca==='alta'?'c-a':j.confianca==='media'?'c-m':'c-b';
      const cl=j.confianca?(j.confianca[0].toUpperCase()+j.confianca.slice(1)):'-';
      html+=`<tr class="dr" id="r${i}" onclick="tog(${i})">
        <td><div class="jn">${j.time_casa} x ${j.time_fora}</div><div class="jh">${j.horario||''}</div></td>
        <td><span class="pill ${lc[j.tipo_liga]||'p-eu'}">${ln[j.tipo_liga]||j.liga}</span></td>
        <td style="font-family:var(--mono);font-size:11px;color:var(--text3)">${j.horario||'-'}</td>
        <td style="font-weight:500;font-size:13px">${j.aposta}</td>
        <td><span class="pill ${mc[j.mercado]||'p-gols'}">${ml[j.mercado]||j.mercado}</span></td>
        <td><span class="dot ${dc}"></span><span class="${cc}" style="font-size:11px;font-family:var(--mono)">${cl}</span></td>
        <td><span class="odd-v">${j.odd_sugerida||'-'}</span></td>
        <td><span class="chev" id="cv${i}">▾</span></td>
      </tr>
      <tr class="er" id="e${i}" style="display:none"><td colspan="8"><div class="ei">
        <div class="eg">
          <div class="ms"><div class="ml2">Gols casa</div><div class="mv2">${j.media_gols_casa||'-'}</div></div>
          <div class="ms"><div class="ml2">Gols fora</div><div class="mv2">${j.media_gols_fora||'-'}</div></div>
          <div class="ms"><div class="ml2">Escanteios</div><div class="mv2">${j.media_escanteios||'-'}</div></div>
          <div class="ms"><div class="ml2">Cartões</div><div class="mv2">${j.media_cartoes||'-'}</div></div>
          <div class="ms"><div class="ml2">Forma casa</div><div class="mv2" style="font-size:10px">${j.forma_casa||'-'}</div></div>
          <div class="ms"><div class="ml2">Forma fora</div><div class="mv2" style="font-size:10px">${j.forma_fora||'-'}</div></div>
        </div>
        <div class="jlabel">Justificativa</div>
        <div class="jtxt">${j.justificativa||'-'}</div>
      </div></td></tr>`;
      i++;
    });
  });
  document.getElementById('tw').innerHTML=`<table><thead><tr>
    <th>Jogo</th><th>Liga</th><th>Hora</th><th>Aposta</th><th>Mercado</th><th>Confiança</th><th>Odd</th><th></th>
  </tr></thead><tbody>${html}</tbody></table>`;
  exp = new Set();
}

function tog(i){
  const er=document.getElementById('e'+i),cv=document.getElementById('cv'+i),rw=document.getElementById('r'+i);
  if(exp.has(i)){er.style.display='none';cv.classList.remove('open');rw.classList.remove('open');exp.delete(i);}
  else{er.style.display='table-row';cv.classList.add('open');rw.classList.add('open');exp.add(i);}
}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script>if(new URLSearchParams(location.search).get('embedded')==='true'){document.write('<style>.nav,.bottom-nav{display:none!important}.main{padding-bottom:0!important}</style>');}</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ligas · OddLab</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#F0EDEA;min-height:100vh;color:#1E293B;font-size:15px;}

/* NAV */
.nav{position:sticky;top:0;z-index:200;height:46px;background:#FAF7F2;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;padding:0 28px;}
.nav-brand{font-size:16px;font-weight:700;color:#1E293B;letter-spacing:-0.4px;margin-right:8px;text-decoration:none;flex-shrink:0;}
.nav-brand span{color:#0F766E;font-weight:300;}
.nav-links{display:flex;align-items:center;flex:1;gap:2px;padding:0 8px;justify-content:center;overflow-x:auto;}
.nl{padding:0 16px;height:46px;display:flex;align-items:center;font-size:13px;font-weight:500;color:#94A3B8;text-decoration:none;transition:color .12s;white-space:nowrap;border-bottom:2px solid transparent;}
.nl:hover{color:#475569;}
.nl.a{color:#0F766E;border-bottom-color:#0F766E;font-weight:600;}

/* PAGE */
.page{padding:28px 32px 40px;max-width:1400px;margin:0 auto;}
.page-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.page-title{font-size:24px;font-weight:800;color:#1E293B;letter-spacing:-0.5px;}
.page-sub{font-size:14px;color:#94A3B8;margin-top:3px;font-weight:300;}
.toggle-wrap{display:flex;gap:3px;background:#fff;border:1px solid #CBD5E1;border-radius:8px;padding:3px;align-self:flex-start;}
.tog-btn{font-size:13px;font-weight:600;padding:6px 16px;border-radius:5px;border:none;background:transparent;color:#475569;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.tog-btn.active{background:#F0FDF9;color:#0F766E;}

/* SUMMARY BAR */
.summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.sc{background:#fff;border-radius:12px;border:1px solid #E2E8F0;padding:16px 20px;}
.sl{font-size:11px;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.sv{font-size:26px;font-weight:800;color:#1E293B;line-height:1;}

/* PANEL */
.panel{background:#fff;border-radius:12px;border:1px solid #E2E8F0;overflow:hidden;}
.panel-head{padding:14px 20px;border-bottom:1px solid #E2E8F0;display:flex;justify-content:space-between;align-items:center;}
.panel-title{font-size:11px;font-weight:700;color:#1E293B;text-transform:uppercase;letter-spacing:.6px;}
.panel-sub{font-size:12px;color:#94A3B8;}

/* LIGAS TABLE */
.liga-thead{display:grid;grid-template-columns:36px 1fr 100px 90px 90px 90px 90px 110px;gap:12px;padding:8px 20px 9px;border-bottom:2px solid #E2E8F0;}
.th{font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.7px;}
.liga-row{display:grid;grid-template-columns:36px 1fr 100px 90px 90px 90px 90px 110px;gap:12px;align-items:center;padding:13px 20px;border-bottom:1px solid #F1F5F9;cursor:pointer;}
.liga-row:last-child{border-bottom:none;}
.liga-row:hover{background:#FAFAF8;}
.liga-row.open{background:#F8FFFE;}
.liga-rank{font-size:13px;font-weight:800;color:#CBD5E1;}
.liga-nome{font-size:14px;font-weight:700;color:#1E293B;}
.liga-pais{font-size:11px;color:#94A3B8;margin-top:1px;}
.liga-total{font-size:12px;color:#94A3B8;}
.pct-val{font-size:15px;font-weight:800;}
.pct-val.g{color:#0F766E;}.pct-val.a{color:#F59E0B;}.pct-val.r{color:#E11D48;}.pct-val.nd{color:#CBD5E1;}
.tag{font-size:10px;padding:3px 9px;border-radius:5px;font-weight:700;white-space:nowrap;}
.tg{color:#0F766E;background:#CCFBF1;}.tw{color:#B45309;background:#FEF3C7;}.tr{color:#BE123C;background:#FFE4E6;}.tp{color:#94A3B8;background:#F1F5F9;}
.chevron{color:#CBD5E1;font-size:11px;transition:transform .15s;}
.chevron.open{transform:rotate(90deg);color:#0F766E;}

/* EXPAND */
.expand-row{display:none;background:#F8FFFE;border-bottom:1px solid #E2E8F0;}
.expand-row.open{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.exp-mkt{padding:14px 18px 16px 60px;border-right:1px solid #E2E8F0;}
.exp-avgs{padding:14px 18px 16px 18px;}
.exp-label{font-size:9px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
.mkt-mini-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.mmg{background:#fff;border-radius:8px;padding:9px 11px;border:1px solid #E2E8F0;}
.mmg-name{font-size:9px;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.mmg-pct{font-size:16px;font-weight:800;}
.mmg-gr{font-size:10px;color:#94A3B8;margin-top:2px;}
.avg-pills{display:flex;flex-direction:column;gap:8px;}
.avg-pill{background:#F0FDFA;border:1px solid #99F6E4;border-radius:8px;padding:10px 13px;}
.avg-pill-val{font-size:18px;font-weight:800;color:#0F766E;letter-spacing:-0.5px;}
.avg-pill-lbl{font-size:10px;color:#64748B;margin-top:2px;}
.avg-pill-am{font-size:9px;color:#94A3B8;margin-top:1px;}
.avg-pill.nd{background:#F8FAFC;border-color:#E2E8F0;}
.avg-pill.nd .avg-pill-val{color:#CBD5E1;}

/* TIMES TABLE (sem expand, sem mercados) */
.times-thead{display:grid;grid-template-columns:36px 1fr 100px 100px 110px;gap:12px;padding:7px 18px 8px;border-bottom:2px solid #E2E8F0;}
.time-row{display:grid;grid-template-columns:36px 1fr 100px 100px 110px;gap:12px;align-items:center;padding:11px 18px;border-bottom:1px solid #F1F5F9;}
.time-row:last-child{border-bottom:none;}
.time-row:hover{background:#FAFAF8;}

/* LOADING / EMPTY */
.loading{text-align:center;padding:48px 20px;color:#CBD5E1;font-size:13px;}
.spin{width:22px;height:22px;border:2px solid #E2E8F0;border-top-color:#0F766E;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 8px;}
.empty{text-align:center;padding:48px 20px;color:#94A3B8;font-size:13px;}
@keyframes sp{to{transform:rotate(360deg);}}

@media(max-width:700px){
  .page{padding:16px;}
  .summary-bar{grid-template-columns:1fr 1fr;}
  .liga-thead,.liga-row{grid-template-columns:28px 1fr 70px 70px;}
  .liga-thead .th:nth-child(n+5),.liga-row>*:nth-child(n+5){display:none;}
  .times-thead,.time-row{grid-template-columns:28px 1fr 70px;}
  .times-thead .th:nth-child(n+4),.time-row>*:nth-child(n+4){display:none;}
  .expand-row.open{grid-template-columns:1fr;}
  .exp-mkt{border-right:none;border-bottom:1px solid #E2E8F0;}
  .mkt-mini-grid{grid-template-columns:repeat(2,1fr);}
}
.bottom-nav{display:none;}
@media(max-width:900px){
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:300;background:#fff;border-top:1px solid #E2E8F0;height:56px;align-items:stretch;}
  .bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:9px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:#94A3B8;text-decoration:none;transition:color .12s;border-top:2px solid transparent;padding-bottom:2px;}
  .bottom-nav a svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .bottom-nav a.active{color:#0F766E;border-top-color:#0F766E;}
  body{padding-bottom:60px;}
}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="index.html">Odd<span>Lab</span></a>
  <div class="nav-links">
    <a class="nl" href="index.html">Apostas</a>
    <a class="nl" href="dashboard.html">Dashboard</a>
    <a class="nl a" href="ligas.html">Ligas</a>
    <a class="nl" href="mercados.html">Mercados</a>
    <a class="nl" href="relatorios.html">Relatórios</a>
    <a class="nl" href="experimental.html">Experimental</a>
    <a class="nl" href="aluno.html">Aluno</a>
  </div>
</nav>

<div class="page">
  <div class="page-head">
    <div>
      <div class="page-title">Ligas & Times</div>
      <div class="page-sub" id="page-sub">Carregando dados...</div>
    </div>
    <div class="toggle-wrap">
      <button class="tog-btn active" id="bl" onclick="vista('ligas')">🏆 Ligas</button>
      <button class="tog-btn" id="bt" onclick="vista('times')">👕 Times</button>
    </div>
  </div>

  <div class="summary-bar" id="summary-bar" style="display:none">
    <div class="sc"><div class="sl" id="sum-lbl">Ligas</div><div class="sv" id="sum-count">--</div></div>
    <div class="sc"><div class="sl">Assertividade</div><div class="sv" id="sum-pct" style="color:#0F766E">--</div></div>
    <div class="sc"><div class="sl">Green total</div><div class="sv" id="sum-green" style="color:#0F766E">--</div></div>
    <div class="sc"><div class="sl">Red total</div><div class="sv" id="sum-red" style="color:#DC2626">--</div></div>
  </div>

  <!-- LIGAS -->
  <div id="vl">
    <div class="loading"><div class="spin"></div>Carregando...</div>
  </div>

  <!-- TIMES -->
  <div id="vt" style="display:none"></div>
</div>

<script>
const B='https://apostas-app.onrender.com';
let dadosLigas=[],dadosTimes=[];
let vistaAtual='ligas';

function pct(g,r){if(!g&&!r)return null;return Math.round(g/(g+r)*100);}
function pctColor(p){if(p===null)return'nd';if(p>=70)return'g';if(p>=55)return'a';return'r';}
function tagClass(p){if(p===null)return'tp';if(p>=70)return'tg';if(p>=55)return'tw';return'tr';}
function mktPct(mercados,k){const m=mercados?.[k];if(!m)return null;return pct(m.green||0,m.red||0);}
function hoje(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function off(b,n){const d=new Date(b+'T12:00:00');d.setDate(d.getDate()+n);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

async function carregar(){
  const h=hoje();

  // Ligas: buscar ligas_conhecidas (fonte autoritativa com mercados + médias)
  // Times: agregar 60 dias de apostas-resultado
  const ps60=[];
  for(let i=1;i<60;i++) ps60.push(fetch(`${B}/apostas-resultado/${off(h,-i)}`).then(r=>r.ok?r.json():null).catch(()=>null));

  const [ligasKnown,diasRaw]=await Promise.all([
    fetch(`${B}/ligas-conhecidas`).then(r=>r.ok?r.json():null).catch(()=>null),
    Promise.all(ps60)
  ]);

  // ── Ligas: de ligas_conhecidas, filtrar mín 2 apostas ──
  if(Array.isArray(ligasKnown)){
    dadosLigas=ligasKnown
      .filter(l=>(l.total||0)>=2)
      .map(l=>({...l,p:pct(l.green||0,l.red||0)}))
      .sort((a,b)=>(b.p??-1)-(a.p??-1));
  }

  // ── Times: de 60 dias de apostas ──
  const dias=diasRaw.filter(d=>d&&d.apostas);
  const tM={};
  for(const dia of dias){
    const ap=dia.apostas?.jogos||[],res=dia.resultados?.apostas||[];
    for(const a of ap){
      const r=res.find(x=>x.jogo_id===a.id);
      const rv=r?.resultado_aposta||'pendente';
      if(rv==='pendente'||rv==='cancelado') continue;
      for(const t of[a.time_casa,a.time_fora]){
        if(!t)continue;
        if(!tM[t])tM[t]={nome:t,green:0,red:0,total:0};
        if(rv==='green')tM[t].green++;else tM[t].red++;
        tM[t].total++;
      }
    }
  }
  dadosTimes=Object.values(tM).filter(t=>t.total>=2).map(t=>({...t,p:pct(t.green,t.red)})).sort((a,b)=>(b.p??-1)-(a.p??-1));

  renderSummary();renderLigas();renderTimes();
}

function renderSummary(){
  const dados=vistaAtual==='ligas'?dadosLigas:dadosTimes;
  if(!dados.length){document.getElementById('summary-bar').style.display='none';return;}
  const tG=dados.reduce((s,d)=>s+(d.green||0),0);
  const tR=dados.reduce((s,d)=>s+(d.red||0),0);
  const tT=tG+tR;
  const pG=tT>0?Math.round(tG/tT*100):0;
  const cor=pG>=70?'#0F766E':pG>=55?'#F59E0B':'#E11D48';
  document.getElementById('summary-bar').style.display='grid';
  document.getElementById('sum-lbl').textContent=vistaAtual==='ligas'?'Ligas':'Times';
  document.getElementById('sum-count').textContent=dados.length;
  document.getElementById('sum-pct').textContent=pG+'%';
  document.getElementById('sum-pct').style.color=cor;
  document.getElementById('sum-green').textContent=tG;
  document.getElementById('sum-red').textContent=tR;
  document.getElementById('page-sub').textContent=vistaAtual==='ligas'
    ?`${dadosLigas.length} ligas · dados de ligas_conhecidas · clique para ver raio-x`
    :`${dadosTimes.length} times com mín. 2 apostas · últimos 60 dias`;
}

function renderLigas(){
  if(!dadosLigas.length){
    document.getElementById('vl').innerHTML='<div class="empty">Nenhuma liga com dados suficientes ainda.</div>';
    return;
  }
  const rows=dadosLigas.map((l,i)=>{
    const pg=mktPct(l.mercados,'gols');
    const pe=mktPct(l.mercados,'escanteios');
    const pr=mktPct(l.mercados,'resultado');
    const pc=mktPct(l.mercados,'cartoes');
    const id=`lig-${i}`;
    const rank=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
    return`
      <div class="liga-row" id="row-${id}" onclick="tog('${id}')">
        <span class="liga-rank">${rank}</span>
        <div>
          <div class="liga-nome">${l.nome||'Liga '+l.liga_id}</div>
          <div class="liga-pais">${l.pais||''} · ${l.total||0} jogos</div>
        </div>
        <span class="liga-total">${l.green||0}G · ${l.red||0}R</span>
        <span class="pct-val ${pctColor(l.p)}">${l.p!==null?l.p+'%':'--'}</span>
        <span class="pct-val ${pctColor(pg)}">${pg!==null?pg+'%':'--'}</span>
        <span class="pct-val ${pctColor(pe)}">${pe!==null?pe+'%':'--'}</span>
        <span class="pct-val ${pctColor(pr)}">${pr!==null?pr+'%':'--'}</span>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span class="tag ${tagClass(l.p)}">${l.p!==null?l.p+'%':'sem dados'}</span>
          <span class="chevron" id="ch-${id}">▶</span>
        </div>
      </div>
      <div class="expand-row" id="${id}">
        <div class="exp-mkt">
          <div class="exp-label">Assertividade por mercado</div>
          <div class="mkt-mini-grid">
            ${['gols','escanteios','resultado','cartoes'].map(k=>{
              const mp=mktPct(l.mercados,k);
              const mv=l.mercados?.[k];
              return`<div class="mmg">
                <div class="mmg-name">${k}</div>
                <div class="mmg-pct ${pctColor(mp)}">${mp!==null?mp+'%':'--'}</div>
                <div class="mmg-gr">${mv?(mv.green||0)+'G · '+(mv.red||0)+'R':'sem dados'}</div>
              </div>`;
            }).join('')}
          </div>
        </div>
        <div class="exp-avgs">
          <div class="exp-label">Médias reais observadas</div>
          <div class="avg-pills">
            <div class="avg-pill${l.media_escanteios?'':' nd'}">
              <div class="avg-pill-val">${l.media_escanteios?Number(l.media_escanteios).toFixed(1):'--'}</div>
              <div class="avg-pill-lbl">média de escanteios por jogo</div>
              <div class="avg-pill-am">${l.amostras_escanteios?l.amostras_escanteios+' amostras':'sem amostras'}</div>
            </div>
            <div class="avg-pill${l.media_cartoes?'':' nd'}">
              <div class="avg-pill-val">${l.media_cartoes?Number(l.media_cartoes).toFixed(1):'--'}</div>
              <div class="avg-pill-lbl">média de cartões por jogo</div>
              <div class="avg-pill-am">${l.amostras_cartoes?l.amostras_cartoes+' amostras':'sem amostras'}</div>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('vl').innerHTML=`<div class="panel">
    <div class="panel-head">
      <span class="panel-title">Ligas por assertividade</span>
      <span class="panel-sub">${dadosLigas.length} ligas · mín. 2 apostas · clique para ver raio-x completo</span>
    </div>
    <div class="liga-thead">
      <span class="th">#</span>
      <span class="th">Liga</span>
      <span class="th">Total ap.</span>
      <span class="th">Geral</span>
      <span class="th">Gols</span>
      <span class="th">Esc.</span>
      <span class="th">Result.</span>
      <span class="th">Assert.</span>
    </div>
    ${rows}
  </div>`;
}

function renderTimes(){
  if(!dadosTimes.length){
    document.getElementById('vt').innerHTML='<div class="empty">Nenhum time com dados suficientes.<br><small style="color:#CBD5E1">Mínimo 2 apostas por time nos últimos 60 dias.</small></div>';
    return;
  }
  const rows=dadosTimes.map((t,i)=>{
    const rank=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
    return`<div class="time-row">
      <span class="liga-rank">${rank}</span>
      <div>
        <div class="liga-nome">${t.nome}</div>
        <div class="liga-pais">${t.total} apostas</div>
      </div>
      <span class="liga-total">${t.green}G · ${t.red}R</span>
      <span class="pct-val ${pctColor(t.p)}">${t.p!==null?t.p+'%':'--'}</span>
      <span class="tag ${tagClass(t.p)}">${t.p!==null?t.p+'%':'sem dados'}</span>
    </div>`;
  }).join('');

  document.getElementById('vt').innerHTML=`<div class="panel">
    <div class="panel-head">
      <span class="panel-title">Times por assertividade</span>
      <span class="panel-sub">${dadosTimes.length} times · mín. 2 apostas · últimos 60 dias</span>
    </div>
    <div class="times-thead">
      <span class="th">#</span>
      <span class="th">Time</span>
      <span class="th">Total ap.</span>
      <span class="th">Geral</span>
      <span class="th">Assert.</span>
    </div>
    ${rows}
  </div>`;
}

function tog(id){
  const exp=document.getElementById(id);
  const row=document.getElementById('row-'+id);
  const ch=document.getElementById('ch-'+id);
  const open=exp.classList.contains('open');
  exp.classList.toggle('open',!open);
  row.classList.toggle('open',!open);
  ch.classList.toggle('open',!open);
}

function vista(v){
  vistaAtual=v;
  document.getElementById('vl').style.display=v==='ligas'?'block':'none';
  document.getElementById('vt').style.display=v==='times'?'block':'none';
  document.getElementById('bl').classList.toggle('active',v==='ligas');
  document.getElementById('bt').classList.toggle('active',v==='times');
  renderSummary();
}

carregar();
</script>

  <a href="relatorios.html"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Relatórios</a>

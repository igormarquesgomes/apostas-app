<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ligas & Times · Análise de Apostas</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080a0f;--s1:#0e1118;--s2:#141720;--s3:#1c2030;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);--text:#e8eaf2;--text2:#7a7f9a;--text3:#3a3f58;--green:#00e676;--red:#ff1744;--amber:#ffab00;--blue:#448aff;--purple:#e040fb;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Bebas Neue',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:52px;background:var(--s1);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-logo-icon{width:28px;height:28px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.nav-logo-icon svg{width:13px;height:13px;color:#000;}
.nav-logo-name{font-size:14px;font-weight:600;color:var(--text);}
.nav-logo-name span{color:var(--green);}
.nav-tabs{display:flex;gap:4px;}
.nav-tab{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;padding:6px 14px;border-radius:6px;border:1px solid transparent;color:var(--text2);cursor:pointer;text-decoration:none;transition:all .15s;}
.nav-tab:hover{color:var(--text);background:var(--s2);}
.nav-tab.active{color:var(--green);border-color:rgba(0,230,118,0.2);background:rgba(0,230,118,0.06);}
.nav-badge{font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:20px;background:rgba(0,230,118,0.08);color:var(--green);border:1px solid rgba(0,230,118,0.2);}
.page{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;}
.page-title{font-family:var(--display);font-size:36px;letter-spacing:1px;}
.toggle-wrap{display:flex;gap:4px;background:var(--s1);border:1px solid var(--border2);border-radius:8px;padding:3px;}
.toggle-btn{font-family:var(--mono);font-size:11px;padding:6px 16px;border-radius:6px;border:none;background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;}
.toggle-btn.active{background:rgba(0,230,118,0.1);color:var(--green);}

/* Tabela */
.table-header{display:grid;gap:12px;padding:8px 18px;margin-bottom:4px;}
.table-header span{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);}
.row{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:grid;gap:12px;align-items:center;margin-bottom:8px;transition:border-color .15s;}
.row:hover{border-color:var(--border2);}

/* Ligas: rank, nome, total, green, red, %, barra */
.ligas-cols{grid-template-columns:32px 1fr 80px 70px 70px 80px 160px;}
/* Times: rank, nome, total, green, red, % */
.times-cols{grid-template-columns:32px 1fr 80px 70px 70px 80px;}

.rank{font-family:var(--display);font-size:22px;color:var(--text3);}
.nome{font-size:13px;font-weight:500;}
.num{font-family:var(--mono);font-size:13px;text-align:center;}
.pct{font-family:var(--display);font-size:24px;text-align:right;}
.barra{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;}
.barra-fill{height:100%;border-radius:3px;transition:width .8s;}

.empty{text-align:center;padding:4rem 2rem;color:var(--text3);font-family:var(--mono);font-size:12px;}
.loading{text-align:center;padding:4rem 2rem;}
.spin{width:26px;height:26px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 10px;}
@keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">
    <div class="nav-logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
    <span class="nav-logo-name">Análise de <span>Apostas</span></span>
  </a>
  <div class="nav-tabs">
    <a class="nav-tab" href="index.html">Apostas</a>
    <a class="nav-tab" href="dashboard.html">Dashboard</a>
    <a class="nav-tab" href="relatorios.html">Relatórios</a>
    <a class="nav-tab active" href="ligas.html">Ligas & Times</a>
  </div>
  <span class="nav-badge">Estrela Bet</span>
</nav>

<div class="page">
  <div class="page-header">
    <div class="page-title">Ligas & Times</div>
    <div class="toggle-wrap">
      <button class="toggle-btn active" id="btn-ligas" onclick="mudarVista('ligas')">Ligas</button>
      <button class="toggle-btn" id="btn-times" onclick="mudarVista('times')">Times</button>
    </div>
  </div>

  <div id="vista-ligas"></div>
  <div id="vista-times" style="display:none"></div>
</div>

<script>
const B='https://apostas-app.onrender.com';
let dadosLigas=[], dadosTimes=[];

function corP(p){return p>=80?'var(--green)':p>=60?'var(--amber)':'var(--red)';}
function offD(base,n){const d=new Date(base+'T12:00:00');d.setDate(d.getDate()+n);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function hoje(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

async function carregarDados(){
  const h=hoje(), promises=[];
  for(let i=0;i<60;i++) promises.push(fetch(`${B}/apostas-resultado/${offD(h,-i)}`).then(r=>r.ok?r.json():null).catch(()=>null));
  const dias=(await Promise.all(promises)).filter(d=>d&&d.apostas);

  const ligasMap={}, timesMap={};
  for(const dia of dias){
    const apostas=dia.apostas?.jogos||[];
    const resultados=dia.resultados?.apostas||[];
    for(const a of apostas){
      const r=resultados.find(x=>x.jogo_id===a.id);
      const res=r?.resultado_aposta||'pendente';
      if(res==='pendente') continue;

      const liga=a.liga||'Outras';
      if(!ligasMap[liga]) ligasMap[liga]={nome:liga,green:0,red:0,total:0};
      if(res==='green') ligasMap[liga].green++;
      else ligasMap[liga].red++;
      ligasMap[liga].total++;

      for(const t of [a.time_casa,a.time_fora]){
        if(!t) continue;
        if(!timesMap[t]) timesMap[t]={nome:t,green:0,red:0,total:0};
        if(res==='green') timesMap[t].green++;
        else timesMap[t].red++;
        timesMap[t].total++;
      }
    }
  }

  dadosLigas=Object.values(ligasMap).map(l=>({...l,pct:Math.round(l.green/l.total*100)})).sort((a,b)=>b.pct-a.pct||b.total-a.total);
  dadosTimes=Object.values(timesMap).filter(t=>t.total>=2).map(t=>({...t,pct:Math.round(t.green/t.total*100)})).sort((a,b)=>b.pct-a.pct||b.total-a.total);

  renderLigas();
  renderTimes();
}

function renderLigas(){
  const el=document.getElementById('vista-ligas');
  if(!dadosLigas.length){el.innerHTML='<div class="empty">Nenhuma liga com dados ainda.</div>';return;}
  el.innerHTML=`
    <div class="table-header ligas-cols">
      <span>#</span><span>Liga</span><span style="text-align:center">Total</span>
      <span style="text-align:center">Green</span><span style="text-align:center">Red</span>
      <span style="text-align:right">Assert.</span><span>Desempenho</span>
    </div>
    ${dadosLigas.map((l,i)=>`
      <div class="row ligas-cols">
        <span class="rank">${i+1}</span>
        <span class="nome">${l.nome}</span>
        <span class="num" style="color:var(--text2)">${l.total}</span>
        <span class="num" style="color:var(--green)">${l.green}</span>
        <span class="num" style="color:var(--red)">${l.red}</span>
        <span class="pct" style="color:${corP(l.pct)}">${l.pct}%</span>
        <div class="barra"><div class="barra-fill" style="width:${l.pct}%;background:${corP(l.pct)}"></div></div>
      </div>`).join('')}`;
}

function renderTimes(){
  const el=document.getElementById('vista-times');
  if(!dadosTimes.length){el.innerHTML='<div class="empty">Nenhum time com dados suficientes ainda.<br>Mínimo 2 apostas por time.</div>';return;}
  el.innerHTML=`
    <div class="table-header times-cols">
      <span>#</span><span>Time</span><span style="text-align:center">Total</span>
      <span style="text-align:center">Green</span><span style="text-align:center">Red</span>
      <span style="text-align:right">Assert.</span>
    </div>
    ${dadosTimes.map((t,i)=>`
      <div class="row times-cols">
        <span class="rank">${i+1}</span>
        <span class="nome">${t.nome}</span>
        <span class="num" style="color:var(--text2)">${t.total}</span>
        <span class="num" style="color:var(--green)">${t.green}</span>
        <span class="num" style="color:var(--red)">${t.red}</span>
        <span class="pct" style="color:${corP(t.pct)}">${t.pct}%</span>
      </div>`).join('')}`;
}

function mudarVista(v){
  document.getElementById('vista-ligas').style.display=v==='ligas'?'block':'none';
  document.getElementById('vista-times').style.display=v==='times'?'block':'none';
  document.getElementById('btn-ligas').classList.toggle('active',v==='ligas');
  document.getElementById('btn-times').classList.toggle('active',v==='times');
}

carregarDados();
</script>
</body>
</html>

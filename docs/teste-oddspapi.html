<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste OddsPapi × Estrela Bet</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 20px; }
  h1 { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .sub { font-size: 12px; color: #666; margin-bottom: 20px; }
  .form { background: #111; border: 1px solid #222; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 6px; }
  input { width: 100%; padding: 10px 12px; background: #0a0a0a; border: 1px solid #222; border-radius: 8px; color: #fff; font-size: 13px; font-family: monospace; margin-bottom: 0; outline: none; }
  input:focus { border-color: #444; }
  #btn-rodar { width: 100%; margin-top: 12px; padding: 13px; background: #0F766E; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: .3px; }
  #btn-rodar:disabled { opacity: 0.4; cursor: not-allowed; }
  #btn-rodar.rodando { background: #333; color: #888; }
  .log { background: #000; border: 1px solid #1a1a1a; border-radius: 12px; padding: 14px; font-family: monospace; font-size: 12px; line-height: 1.8; min-height: 240px; max-height: 700px; overflow-y: auto; white-space: pre-wrap; }
  .ok   { color: #4ADE80; }
  .err  { color: #F87171; }
  .warn { color: #FBBF24; }
  .info { color: #60A5FA; }
  .dim  { color: #3a3a3a; }
  .bold { color: #C0C0C0; font-weight: bold; }
  #btn-salvar { margin-top: 10px; width: 100%; padding: 10px; background: #111; border: 1px solid #222; border-radius: 8px; color: #666; font-size: 12px; cursor: pointer; }
  #btn-salvar:hover { color: #aaa; border-color: #444; }
</style>
</head>
<body>

<h1>Teste OddsPapi × Estrela Bet</h1>
<div class="sub">Cole a chave e clique em Rodar — faz tudo automaticamente</div>

<div class="form">
  <label>OddsPapi API Key</label>
  <input type="password" id="key" placeholder="cole sua chave aqui" />
  <button id="btn-rodar" onclick="rodarTudo()">▶ Rodar diagnóstico completo</button>
</div>

<div class="log" id="log">aguardando...</div>
<button id="btn-salvar" onclick="salvar()">💾 Salvar resultado JSON</button>

<script>
const PROXY = 'https://api.allorigins.win/raw?url=';
let resultado = {};

function log(msg, cls='') {
  const el = document.getElementById('log');
  if (el.textContent === 'aguardando...') el.textContent = '';
  const span = document.createElement('span');
  span.className = cls;
  span.textContent = msg + '\n';
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

async function get(url) {
  const r = await fetch(PROXY + encodeURIComponent(url));
  const txt = await r.text();
  let parsed;
  try { parsed = JSON.parse(txt); }
  catch(e) { throw new Error('Resposta inválida: ' + txt.substring(0, 200)); }
  // allorigins às vezes embala em {contents}
  if (parsed && typeof parsed.contents === 'string') {
    try { return JSON.parse(parsed.contents); } catch(e) { return parsed.contents; }
  }
  return parsed;
}

function diaOffset(n) {
  const d = new Date(); d.setDate(d.getDate() + n);
  return d.toISOString().substring(0, 10);
}

async function rodarTudo() {
  const KEY = document.getElementById('key').value.trim();
  if (!KEY) return alert('Cole a chave OddsPapi antes de rodar.');

  // Reset
  document.getElementById('log').textContent = '';
  resultado = { gerado_em: new Date().toISOString(), fixtures_total: 0, fixtures_com_odds: 0, testados: [], estrelabet: [] };
  const btn = document.getElementById('btn-rodar');
  btn.disabled = true;
  btn.textContent = '⏳ Rodando...';
  btn.classList.add('rodando');

  const MARKET_NAMES = {
    '101':'Resultado Final (1X2)', '104':'Ambas Marcam',
    '106':'Over/Under 0.5', '1010':'Over/Under 2.5', '1012':'Over/Under 1.5',
    '1014':'Over/Under 3.5', '1016':'Over/Under 4.5',
    '1060':'Asian Handicap -1.5', '1068':'Asian Handicap -0.5', '1076':'Asian Handicap +0.5'
  };
  const OUTCOME_NAMES = {
    '101':'Casa','102':'Empate','103':'Fora','104':'Sim','105':'Não',
    '106':'Over','107':'Under','1010':'Over 2.5','1011':'Under 2.5',
    '1012':'Over 1.5','1013':'Under 1.5','1014':'Over 3.5','1015':'Under 3.5',
    '1016':'Over 4.5','1017':'Under 4.5'
  };

  try {
    // ── PASSO 1: Buscar fixtures ──────────────────────────────
    log('PASSO 1 — Buscando fixtures de futebol...', 'bold');

    let todosFixtures = [];
    for (let offset = 0; offset <= 7; offset++) {
      const from = diaOffset(offset);
      const to   = diaOffset(offset + 1);
      const url  = `https://api.oddspapi.io/v4/fixtures?sportId=10&from=${from}&to=${to}&apiKey=${KEY}`;
      try {
        const data = await get(url);
        if (data && data.error) { log(`  ❌ Erro da API: ${data.error.message}`, 'err'); break; }
        const arr = data.fixtures || data.data || (Array.isArray(data) ? data : []);
        if (arr.length > 0) {
          todosFixtures.push(...arr);
          log(`  ${from}: ${arr.length} fixtures (${arr.filter(f=>f.hasOdds).length} com odds)`, 'dim');
        }
      } catch(e) {
        log(`  Erro em ${from}: ${e.message}`, 'warn');
      }
    }

    const comOdds = todosFixtures.filter(f => f.hasOdds === true);
    resultado.fixtures_total = todosFixtures.length;
    resultado.fixtures_com_odds = comOdds.length;
    log(`\nTotal fixtures encontrados: ${todosFixtures.length}`, '');
    log(`Com hasOdds=true: ${comOdds.length}`, comOdds.length > 0 ? 'ok' : 'warn');

    if (comOdds.length === 0) {
      log('\n⚠️  Nenhum fixture com odds disponível no plano atual.', 'warn');
      log('  Verifique se a chave é válida e se o plano inclui odds.', 'warn');
      resultado.conclusao = 'Sem fixtures com odds disponíveis';
      btn.disabled = false; btn.textContent = '▶ Rodar novamente'; btn.classList.remove('rodando');
      return;
    }

    // ── PASSO 2: Testar odds dos primeiros 8 fixtures ─────────
    log('\nPASSO 2 — Buscando odds da Estrela Bet...', 'bold');
    const testar = comOdds.slice(0, 8);
    let encontrado = false;

    for (const f of testar) {
      const fid = f.fixtureId || f.id;
      const p1  = f.participant1Name || f.home || '?';
      const p2  = f.participant2Name || f.away || '?';
      const dt  = (f.startTime || f.date || '').substring(0, 16);
      log(`\n  ${p1} × ${p2} | ${dt}`, 'info');
      log(`  fixtureId: ${fid}`, 'dim');

      try {
        await new Promise(r => setTimeout(r, 400)); // rate limit
        const dataOdds = await get(`https://api.oddspapi.io/v4/odds?fixtureId=${fid}&apiKey=${KEY}`);
        resultado.testados.push({ fixtureId: fid, partida: `${p1} x ${p2}`, raw: dataOdds });

        const bks = dataOdds.bookmakerOdds || dataOdds.odds || dataOdds.bookmakers || {};
        const bkList = Object.keys(bks);

        if (bkList.length === 0) {
          log('  Sem bookmakers na resposta', 'dim');
          continue;
        }

        log(`  Bookmakers: ${bkList.slice(0, 6).join(', ')}${bkList.length > 6 ? ` +${bkList.length-6}` : ''}`, 'dim');

        const eb = bks.estrelabet || bks['Estrela Bet'] || bks['estrelaBet'];
        if (!eb) {
          log('  Estrela Bet: não disponível neste fixture', 'dim');
          continue;
        }

        encontrado = true;
        log('  ✅ ESTRELA BET ENCONTRADA!', 'ok');

        const markets = eb.markets || {};
        const mIds = Object.keys(markets);
        log(`  Mercados (${mIds.length}): ${mIds.join(', ')}`, 'info');

        let todasOdds = [];
        mIds.forEach(mid => {
          const m = markets[mid];
          const mName = MARKET_NAMES[mid] || `Mercado ${mid}`;
          const outcomes = m.outcomes || {};
          Object.entries(outcomes).forEach(([oid, o]) => {
            const player = (o.players && o.players['0']) || {};
            const price  = parseFloat(player.price || 0);
            const active = player.active !== false;
            const oName  = OUTCOME_NAMES[oid] || `Outcome ${oid}`;
            if (price > 0) todasOdds.push({ marketId: mid, marketName: mName, outcomeName: oName, price, active });
          });
        });

        const disponiveis = todasOdds.filter(o => o.price >= 1.25 && o.active).sort((a,b) => b.price - a.price);
        log(`  Total odds: ${todasOdds.length} | Acima de 1.25: ${disponiveis.length}`, disponiveis.length > 0 ? 'ok' : 'warn');

        if (disponiveis.length > 0) {
          log('  Odds >= 1.25:', 'ok');
          disponiveis.forEach(o => {
            log(`    ${o.price.toFixed(2)}  ${o.marketName} → ${o.outcomeName}`, 'ok');
          });
        }

        resultado.estrelabet.push({ fixtureId: fid, partida: `${p1} x ${p2}`, data: dt, mercados: mIds, odds_disponiveis: disponiveis, raw_eb: eb });

      } catch(e) {
        log(`  ❌ Erro: ${e.message}`, 'err');
      }
    }

    // ── PASSO 3: Resumo final ─────────────────────────────────
    log('\n' + '='.repeat(44), 'bold');
    log('RESUMO FINAL', 'bold');
    log('='.repeat(44), 'bold');
    log(`Fixtures testados: ${resultado.testados.length}`, '');
    log(`Fixtures com Estrela Bet: ${resultado.estrelabet.length}`, resultado.estrelabet.length > 0 ? 'ok' : 'warn');

    if (encontrado) {
      const totalOdds = resultado.estrelabet.reduce((s, f) => s + f.odds_disponiveis.length, 0);
      const mercadosUnicos = [...new Set(resultado.estrelabet.flatMap(f => f.mercados))];
      log(`Mercados encontrados: ${mercadosUnicos.map(id => MARKET_NAMES[id] || id).join(', ')}`, 'ok');
      log(`Total de odds >= 1.25 encontradas: ${totalOdds}`, 'ok');
      log('\n✅ Estrela Bet está disponível — pronto para integrar!', 'ok');
    } else {
      log('\n❌ Estrela Bet não encontrada nos fixtures testados.', 'err');
      log('   Pode ser limitação do plano ou cobertura insuficiente.', 'warn');
    }
    log('='.repeat(44), 'bold');
    resultado.conclusao = encontrado ? 'OK — Estrela Bet disponível' : 'FALHOU — Estrela Bet não encontrada';

  } catch(e) {
    log(`\n❌ Erro crítico: ${e.message}`, 'err');
    resultado.erro_critico = e.message;
  }

  btn.disabled = false;
  btn.textContent = '▶ Rodar novamente';
  btn.classList.remove('rodando');
}

function salvar() {
  if (!resultado || Object.keys(resultado).length === 0) {
    alert('Rode o diagnóstico primeiro.');
    return;
  }
  const blob = new Blob([JSON.stringify(resultado, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'teste-oddspapi-resultado.json';
  a.click();
}
</script>
</body>
</html>
